<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작가님의 일일 업무 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .view-section { display: none; }
        .view-section.active-flex { display: flex; }
        .view-section.active-block { display: block; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="h-screen flex overflow-hidden text-gray-800 relative">

    <!-- 로그인 오버레이 화면 -->
    <div id="login-screen" class="fixed inset-0 bg-gray-50 z-[100] flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-gray-100 animate-fade-in-up">
            <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-5 shadow-inner">
                <i class="fa-solid fa-pen-nib"></i>
            </div>
            <h2 class="text-2xl font-extrabold text-center text-gray-800 mb-1">Studio 로그</h2>
            <p class="text-center text-sm text-gray-500 mb-8 font-medium">웹툰 작가님의 일일 업무 관리</p>
            
            <!-- 🚨 HTML 내부의 onsubmit 속성을 모두 제거하여 충돌 방지 -->
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 ml-1">이메일 계정</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input type="email" id="login-email" required placeholder="example@naver.com" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all font-medium">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1.5 ml-1">비밀번호</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="login-password" required placeholder="••••••••" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all font-medium">
                    </div>
                </div>
                
                <p id="login-error" class="text-red-500 text-sm text-center hidden font-bold bg-red-50 py-2 rounded-lg"></p>
                
                <button type="submit" id="login-submit-btn" class="w-full py-3.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold mt-2 shadow-md shadow-indigo-200 flex items-center justify-center gap-2 transition-all hover:-translate-y-0.5">
                    <span id="login-btn-text">로그인하여 시작하기</span>
                    <div id="login-loader" class="loader !w-5 !h-5 !border-[2.5px] hidden border-t-white border-white/30"></div>
                </button>
            </form>
        </div>
    </div>

    <!-- 사이드바 -->
    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex z-20">
        <div class="p-6 border-b border-gray-200 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-xl shrink-0">
                <i class="fa-solid fa-pen-nib"></i>
            </div>
            <div class="flex-1 min-w-0">
                <h1 class="font-bold text-lg truncate">Studio 로그</h1>
                <p class="text-xs text-gray-500 flex items-center gap-1">
                    <span id="sync-status" class="w-2 h-2 rounded-full bg-gray-300 inline-block"></span> 
                    <span id="sync-text" class="truncate">연결 대기중...</span>
                </p>
                <button onclick="window.handleLogout()" class="mt-1.5 text-[11px] font-bold text-gray-400 hover:text-red-500 flex items-center gap-1 transition-colors w-fit px-1.5 py-0.5 rounded hover:bg-red-50 cursor-pointer">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> 계정 로그아웃
                </button>
            </div>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <a href="#" onclick="window.switchView('dashboard')" id="nav-dashboard" class="flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-medium transition-colors">
                <i class="fa-solid fa-calendar-day"></i> 오늘 일정
            </a>
            <a href="#" onclick="window.switchView('all-tasks')" id="nav-all-tasks" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition-colors">
                <i class="fa-solid fa-list-check"></i> 전체 업무
            </a>
            <a href="#" onclick="window.switchView('statistics')" id="nav-statistics" class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition-colors">
                <i class="fa-solid fa-chart-pie"></i> 작업 통계
            </a>
        </nav>

        <div class="p-4 border-t border-gray-200">
            <div class="bg-indigo-50 rounded-xl p-4 text-center">
                <p class="text-sm font-medium text-indigo-800 mb-2">"오늘도 마감 화이팅!"</p>
            </div>
        </div>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50/50 relative">
        <header class="bg-white p-6 border-b border-gray-200 flex justify-between items-center z-10 shadow-sm shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="window.openMonthPicker()" class="flex items-center gap-2 text-lg font-bold text-gray-800 bg-gray-50 border border-gray-200 rounded-lg px-4 py-1.5 hover:border-indigo-300 hover:bg-indigo-50 transition-colors">
                    <span id="header-month-display">2026년 3월</span>
                    <i class="fa-solid fa-caret-down text-sm text-gray-400"></i>
                </button>
                
                <div class="flex gap-1">
                    <button onclick="window.changeMonth(-1)" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="이전 달"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="window.resetToToday()" class="px-3 py-1.5 text-sm font-bold text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors border border-indigo-200 bg-indigo-50/50 shadow-sm">오늘</button>
                    <button onclick="window.changeMonth(1)" class="p-2 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="다음 달"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="window.openCategoryManager()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2.5 rounded-lg font-medium shadow-sm transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-tags"></i> 분류 관리
                </button>
                <button onclick="window.openTaskModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg font-bold shadow-sm transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> 업무 추가
                </button>
            </div>
        </header>

        <!-- [뷰 1] 대시보드 -->
        <div id="view-dashboard" class="view-section active-flex flex-1 overflow-y-auto p-6 flex-col xl:flex-row gap-6">
            <div class="flex-1 flex flex-col gap-6 min-w-0">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col shrink-0">
                    <div class="grid grid-cols-7 gap-2 mb-2 text-center text-sm font-bold text-gray-400">
                        <div class="text-red-400">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="text-blue-400">토</div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-2 flex-1 auto-rows-fr min-h-[300px]"></div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex-1 min-h-[250px] flex flex-col">
                    <div class="flex justify-between items-center mb-4 border-b pb-3 shrink-0">
                        <h3 class="font-bold text-lg text-gray-800 flex items-center gap-2 cursor-pointer hover:text-indigo-600 transition-colors group" onclick="window.openWeekPicker()">
                            <i class="fa-solid fa-calendar-week text-indigo-500"></i>
                            <span id="weekly-week-number">2026년 14주차</span>
                            <i class="fa-solid fa-caret-down text-sm text-gray-400 group-hover:text-indigo-600 ml-0.5"></i>
                        </h3>
                        <div class="flex items-center gap-2">
                            <button onclick="window.changeWeek(-1)" class="w-7 h-7 flex items-center justify-center rounded bg-gray-100 text-gray-500 hover:bg-indigo-100 hover:text-indigo-600 transition-colors"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                            <span class="text-sm font-medium text-gray-600 min-w-[90px] text-center" id="weekly-range-text">3.31 ~ 4.6</span>
                            <button onclick="window.changeWeek(1)" class="w-7 h-7 flex items-center justify-center rounded bg-gray-100 text-gray-500 hover:bg-indigo-100 hover:text-indigo-600 transition-colors"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                        </div>
                    </div>
                    <div id="weekly-container" class="space-y-3 overflow-y-auto pr-2 flex-1"></div>
                </div>
            </div>

            <div class="w-full xl:w-96 flex flex-col gap-6 shrink-0">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex-1 flex flex-col h-[500px]">
                    <div class="mb-4 border-b pb-3 shrink-0">
                        <h3 class="text-lg text-gray-800 flex items-center gap-2" id="selected-date-display"></h3>
                        <p class="text-sm text-gray-500 mt-1" id="task-progress-text">0개의 작업 중 0개 완료</p>
                    </div>
                    <div id="timeline-container" class="flex-1 overflow-y-auto pr-2 space-y-4 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent min-h-[200px]"></div>
                </div>

                <div class="bg-yellow-50 rounded-2xl shadow-sm border border-yellow-100 p-6 h-48 flex flex-col shrink-0">
                    <h3 class="font-bold text-yellow-800 mb-2 flex items-center justify-between">
                        <span><i class="fa-regular fa-note-sticky mr-2"></i>작업 메모</span>
                    </h3>
                    <textarea class="w-full flex-1 bg-transparent border-none resize-none focus:ring-0 text-sm text-yellow-900 placeholder-yellow-600/50" placeholder="해당 날짜에 대한 아이디어나 수정사항을 적어두세요."></textarea>
                </div>
            </div>
        </div>

        <!-- [뷰 2] 전체 업무 리스트 -->
        <div id="view-all-tasks" class="view-section flex-1 overflow-y-auto p-6">
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full min-h-[600px]">
                <div class="p-5 border-b border-gray-100 bg-gray-50 flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 shrink-0">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6">
                        <h3 class="font-bold text-lg text-gray-800"><i class="fa-solid fa-list-check mr-2 text-indigo-500"></i>업무 내역</h3>
                        <div class="flex bg-gray-200/60 p-1 rounded-lg w-fit">
                            <button id="tab-alltasks-week" onclick="window.setAllTasksMode('week')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700 hover:bg-gray-200">주간</button>
                            <button id="tab-alltasks-month" onclick="window.setAllTasksMode('month')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all bg-white shadow-sm text-indigo-600">월간</button>
                            <button id="tab-alltasks-year" onclick="window.setAllTasksMode('year')" class="px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700 hover:bg-gray-200">연간</button>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
                        <div class="flex items-center gap-2">
                            <button onclick="window.changeAllTasksPeriod(-1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-colors"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                            <span class="text-base font-bold text-gray-700 min-w-[130px] text-center" id="all-tasks-period-display">2026년 3월</span>
                            <button onclick="window.changeAllTasksPeriod(1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-500 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-colors"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                        </div>
                        <div class="hidden sm:block w-px h-6 bg-gray-300"></div>
                        <span class="text-sm font-medium text-gray-500 bg-white px-3 py-1 rounded-full border border-gray-200" id="all-tasks-count">총 0건</span>
                    </div>
                </div>

                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse min-w-[800px]">
                        <thead>
                            <tr class="bg-white text-gray-500 text-sm border-b sticky top-0 shadow-sm z-10">
                                <th class="p-4 font-semibold w-32">날짜</th>
                                <th class="p-4 font-semibold w-36">시간</th>
                                <th class="p-4 font-semibold w-36">분류</th>
                                <th class="p-4 font-semibold">업무 내용</th>
                                <th class="p-4 font-semibold w-24 text-center">상태</th>
                                <th class="p-4 font-semibold w-24 text-right">관리</th>
                            </tr>
                        </thead>
                        <tbody id="all-tasks-tbody" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- [뷰 3] 작업 통계 -->
        <div id="view-statistics" class="view-section flex-1 overflow-y-auto p-6">
            <div class="max-w-5xl mx-auto space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-layer-group"></i></div>
                        <div>
                            <p class="text-gray-500 text-sm font-medium">등록된 총 업무</p>
                            <h4 class="text-2xl font-bold text-gray-800" id="stat-total-tasks">0건</h4>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-check-double"></i></div>
                        <div>
                            <p class="text-gray-500 text-sm font-medium">완료율</p>
                            <h4 class="text-2xl font-bold text-gray-800" id="stat-completion-rate">0%</h4>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="w-14 h-14 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center text-2xl"><i class="fa-solid fa-clock-rotate-left"></i></div>
                        <div>
                            <p class="text-gray-500 text-sm font-medium">총 작업 시간</p>
                            <h4 class="text-2xl font-bold text-gray-800" id="stat-total-hours">0시간</h4>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="font-bold text-lg text-gray-800 mb-6 border-b pb-3"><i class="fa-solid fa-chart-bar mr-2 text-indigo-500"></i>작업 분류별 통계</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10" id="stat-categories-container"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- 모달: 업무 추가/수정 -->
    <div id="task-modal" class="fixed inset-0 bg-black/50 z-[60] flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden animate-fade-in-up">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="font-bold text-lg" id="task-modal-title">새 업무 기록하기</h3>
                <button onclick="window.closeTaskModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <!-- 🚨 HTML 내부 속성 제거 -->
            <form id="add-task-form" class="p-6 space-y-5">
                <input type="hidden" id="edit-task-id">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">날짜</label>
                        <input type="date" id="task-date" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1 flex justify-between">작업 분류</label>
                        <div class="relative w-full">
                            <select id="task-category" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none appearance-none bg-white font-medium text-gray-700"></select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                                <i class="fa-solid fa-caret-down text-sm"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">업무 내용</label>
                    <input type="text" id="task-title" placeholder="예: 45화 밑색 작업" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1 flex items-center justify-between">작업 시간</label>
                    <div class="flex items-center gap-2 mb-2">
                        <input type="time" id="task-start" required class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-gray-700">
                        <span class="text-gray-400 font-bold">~</span>
                        <input type="time" id="task-end" required class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-medium text-gray-700">
                    </div>
                    
                    <div class="flex gap-2 p-2 bg-gray-50 rounded-lg border border-gray-100 overflow-x-auto scrollbar-hide">
                        <button type="button" onclick="window.setStartTimeToNow()" class="shrink-0 px-2.5 py-1 text-xs bg-white text-gray-700 rounded shadow-sm hover:bg-gray-100 border border-gray-200 font-medium whitespace-nowrap"><i class="fa-solid fa-clock mr-1"></i>시작: 지금</button>
                        <div class="w-px h-5 bg-gray-300 mx-0.5 mt-0.5 shrink-0"></div>
                        <button type="button" onclick="window.addTimeToEnd(30)" class="shrink-0 px-2.5 py-1 text-xs bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 font-medium whitespace-nowrap">+30분</button>
                        <button type="button" onclick="window.addTimeToEnd(60)" class="shrink-0 px-2.5 py-1 text-xs bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 font-medium whitespace-nowrap">+1시간</button>
                        <button type="button" onclick="window.addTimeToEnd(120)" class="shrink-0 px-2.5 py-1 text-xs bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 font-medium whitespace-nowrap">+2시간</button>
                        <button type="button" onclick="window.addTimeToEnd(240)" class="shrink-0 px-2.5 py-1 text-xs bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 font-medium whitespace-nowrap">반나절(4h)</button>
                    </div>
                </div>

                <div class="pt-2 flex gap-3">
                    <button type="button" onclick="window.closeTaskModal()" class="flex-1 px-4 py-2.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition-colors">취소</button>
                    <button type="submit" class="flex-1 px-4 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium flex items-center justify-center gap-2 transition-colors">
                        <span id="task-submit-text">저장하기</span>
                        <div id="task-submit-loader" class="loader !w-4 !h-4 !border-[2px] hidden border-t-white border-white/30"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 모달: 년/월 선택 -->
    <div id="month-picker-modal" class="fixed inset-0 bg-black/50 z-[80] flex items-center justify-center hidden backdrop-blur-sm">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden p-6 animate-fade-in-up">
            <div class="flex justify-between items-center mb-6">

    <!-- 🔥 Firebase 연결 스크립트 (가장 안전한 구조로 재작성) -->

        // 1. 파이어베이스 즉시 초기화 (기다림 없이 무조건 1순위 실행)
        const firebaseConfig = {
            apiKey: "AIzaSyBD5-AJDFJKsneHyqH70SlNU9VixDAHl3o",

            projectId: "openzeroc",

            alert("서버 연결 초기화에 실패했습니다. 페이지를 새로고침 해주세요.");

        // --- 유틸리티 및 전역 상태 ---
        const colorPalette = {
            'blue': { base: 'blue', color: 'bg-blue-100 text-blue-800 border-blue-200', dot: 'bg-blue-500', hex: '#3b82f6' },
            'orange': { base: 'orange', color: 'bg-orange-100 text-orange-800 border-orange-200', dot: 'bg-orange-500', hex: '#f97316' },
            'zinc': { base: 'zinc', color: 'bg-zinc-100 text-zinc-800 border-zinc-300', dot: 'bg-zinc-800', hex: '#3f3f46' },
            'pink': { base: 'pink', color: 'bg-pink-100 text-pink-800 border-pink-200', dot: 'bg-pink-500', hex: '#ec4899' },
            'purple': { base: 'purple', color: 'bg-purple-100 text-purple-800 border-purple-200', dot: 'bg-purple-500', hex: '#a855f7' },
            'emerald': { base: 'emerald', color: 'bg-emerald-100 text-emerald-800 border-emerald-200', dot: 'bg-emerald-500', hex: '#10b981' },

        };

        const defaultCategories = {
            'cat_story': { id: 'cat_story', name: '스토리/콘티', colorBase: 'blue', icon: 'fa-book-open' },
            'cat_sketch': { id: 'cat_sketch', name: '스케치', colorBase: 'orange', icon: 'fa-pencil' },
            'cat_line': { id: 'cat_line', name: '펜선', colorBase: 'zinc', icon: 'fa-pen-clip' },
            'cat_color': { id: 'cat_color', name: '채색/명암', colorBase: 'pink', icon: 'fa-palette' },
            'cat_edit': { id: 'cat_edit', name: '식자/편집', colorBase: 'purple', icon: 'fa-font' },
            'cat_etc': { id: 'cat_etc', name: '기타/미팅', colorBase: 'emerald', icon: 'fa-mug-hot' }
        };

        function formatDateString(dateObj) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getWeekNumber(d) {
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return {
                year: date.getFullYear(),
                week: 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7)
            };
        }

        function getWeeksInYear(year) {
            const dec31 = new Date(year, 11, 31);
            const weekInfo = getWeekNumber(dec31);
            return weekInfo.week === 1 ? getWeekNumber(new Date(year, 11, 24)).week : weekInfo.week;
        }

        function getDateOfISOWeek(week, year) {
            const date = new Date(year, 0, 4);
            date.setDate(date.getDate() - date.getDay() + (week - 1) * 7);
            return date;
        }

        function calculateDuration(start, end) {
            if(!start || !end) return 0;
            const [sh, sm] = start.split(':').map(Number);
            const [eh, em] = end.split(':').map(Number);
            let duration = (eh * 60 + em) - (sh * 60 + sm);
            if (duration < 0) duration += 24 * 60;
            return duration / 60; 
        }

        let currentDate = new Date(); 
        let selectedDate = new Date(); 
        let weeklyBrowseDate = new Date(); 
        let allTasksMode = 'month'; 
        let allTasksDate = new Date(); 
        let pickingMonthYear = new Date().getFullYear();
        let pickingWeekYear = new Date().getFullYear();
        let currentView = 'dashboard';
        
        let categories = {};
        let tasks = [];
        let publicHolidaysCache = {}; 
        
        let currentUser = null;
        let tasksUnsub = null;
        let catsUnsub = null;
        let pendingConfirmAction = null; 

        async function fetchKoreanHolidays(year) {
            if (publicHolidaysCache[year]) return; 
            try {
                const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
                if (!response.ok) throw new Error();
                const holidays = await response.json();
                publicHolidaysCache[year] = {};
                holidays.forEach(h => { publicHolidaysCache[year][h.date] = h.localName; });
            } catch (err) {}
        }

        // 2. 상태 감지 리스너 (즉시 연결)
        if (auth) {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    if (user.isAnonymous) {
                        await signOut(auth);
                        return; 
                    }
                    currentUser = user;
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('sync-status').classList.replace('bg-gray-300', 'bg-green-500');
                    document.getElementById('sync-status').classList.replace('bg-red-500', 'bg-green-500');
                    document.getElementById('sync-text').textContent = user.email; 
                    setupFirestoreListeners();
                } else {
                    currentUser = null;
                    document.getElementById('login-screen').classList.remove('hidden');
                    document.getElementById('sync-status').classList.replace('bg-green-500', 'bg-red-500');
                    document.getElementById('sync-status').classList.replace('bg-gray-300', 'bg-red-500');
                    document.getElementById('sync-text').textContent = '로그아웃 됨';
                    if(tasksUnsub) { tasksUnsub(); tasksUnsub = null; }
                    if(catsUnsub) { catsUnsub(); catsUnsub = null; }
                    
                    tasks = [];
                    categories = {};
                    updateAllUI();
                }
            });
        }

        function setupFirestoreListeners() {
            if (!currentUser) return;

            const tasksRef = collection(db, 'daily_work', currentUser.uid, 'daily');
            tasksUnsub = onSnapshot(tasksRef, (snapshot) => {
                tasks = snapshot.docs.map(doc => doc.data());
                updateAllUI();
            });

            const catsRef = collection(db, 'daily_work', currentUser.uid, 'categories');
            catsUnsub = onSnapshot(catsRef, (snapshot) => {
                if (snapshot.empty && Object.keys(categories).length === 0) {
                    Object.values(defaultCategories).forEach(cat => {
                        const catRef = doc(db, 'daily_work', currentUser.uid, 'categories', cat.id);
                        setDoc(catRef, cat);
                    });
                } else {
                    categories = {};
                    snapshot.docs.forEach(doc => { categories[doc.id] = doc.data(); });
                    renderCategoryDropdown(); 
                    renderCategoryManagerList();
                    updateAllUI();
                }
            });
        }

        // 3. 화면 렌더링 완료 후 이벤트 바인딩
        document.addEventListener('DOMContentLoaded', async () => {
            initColorPicker();
            updateAllUI();
            
            // 로그인 폼 이벤트
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault(); 
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const errorEl = document.getElementById('login-error');
                const btnText = document.getElementById('login-btn-text');
                const loader = document.getElementById('login-loader');

                if (!auth) {
                    errorEl.textContent = '서버 연결에 문제가 있습니다. 새로고침 해주세요.';
                    errorEl.classList.remove('hidden');
                    return;
                }

                btnText.classList.add('hidden');
                loader.classList.remove('hidden');
                errorEl.classList.add('hidden');

                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (error) {
                    let errorMsg = '로그인 실패: 다시 시도해주세요.';
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        errorMsg = '이메일 또는 비밀번호가 올바르지 않습니다.';
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMsg = '시도 횟수가 너무 많습니다. 잠시 후 다시 시도해주세요.';
                    } else {
                        errorMsg = '에러: ' + error.message;
                    }
                    errorEl.textContent = errorMsg;
                    errorEl.classList.remove('hidden');
                } finally {
                    btnText.classList.remove('hidden');
                    loader.classList.add('hidden');
                }
            });

            // 업무 폼 이벤트
            document.getElementById('add-task-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if(!currentUser) return;

                document.getElementById('task-submit-text').classList.add('hidden');
                document.getElementById('task-submit-loader').classList.remove('hidden');

                const id = document.getElementById('edit-task-id').value;
                const taskData = {
                    title: document.getElementById('task-title').value,
                    date: document.getElementById('task-date').value,
                    startTime: document.getElementById('task-start').value,
                    endTime: document.getElementById('task-end').value,
                    category: document.getElementById('task-category').value,
                };

                const docId = id ? id : Date.now().toString();
                const taskRef = doc(db, 'daily_work', currentUser.uid, 'daily', docId);

                try {
                    if (id) await setDoc(taskRef, taskData, { merge: true });
                    else await setDoc(taskRef, { id: docId, completed: false, ...taskData });
                    
                    window.selectDay(taskData.date); 
                    window.closeTaskModal();
                } catch (err) {
                    console.error("Task 저장 에러", err);
                    window.showCustomAlert('저장 에러', '보안 규칙 또는 서버 연결을 확인해주세요.', 'error');
                } finally {
                    document.getElementById('task-submit-text').classList.remove('hidden');
                    document.getElementById('task-submit-loader').classList.add('hidden');
                }
            });

            // 카테고리 폼 이벤트
            document.getElementById('category-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                if(!currentUser) return;

                document.getElementById('cat-submit-text').classList.add('hidden');
                document.getElementById('cat-submit-loader').classList.remove('hidden');

                const id = document.getElementById('edit-cat-id').value;
                const name = document.getElementById('cat-name').value;
                const colorBase = document.getElementById('cat-color').value;
                const icons = ['fa-tag', 'fa-bookmark', 'fa-star', 'fa-fire', 'fa-bolt', 'fa-check'];
                const randomIcon = icons[Math.floor(Math.random() * icons.length)];

                const docId = id ? id : 'cat_' + Date.now();
                const catRef = doc(db, 'daily_work', currentUser.uid, 'categories', docId);

                try {
                    if (id) await setDoc(catRef, { name, colorBase }, { merge: true });
                    else await setDoc(catRef, { id: docId, name, colorBase, icon: randomIcon });
                    
                    window.resetCategoryForm();
                } catch (err) {
                    console.error("카테고리 저장 에러", err);
                } finally {
                    document.getElementById('cat-submit-text').classList.remove('hidden');
                    document.getElementById('cat-submit-loader').classList.add('hidden');
                }
            });

            await fetchKoreanHolidays(currentDate.getFullYear());
            updateAllUI();
        });

        // --- 각종 UI 조작 함수들을 Window 객체에 명시적 바인딩 ---
        window.handleLogout = async function() {
            try { await signOut(auth); } catch(e) {}
        };

        window.showCustomAlert = function(title, desc, type='info') {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-desc').textContent = desc;
            const iconBox = document.getElementById('confirm-icon-box');
            const icon = document.getElementById('confirm-icon');
            const okBtn = document.getElementById('confirm-ok-btn');
            
            document.getElementById('confirm-cancel-btn').classList.add('hidden');
            pendingConfirmAction = null; 
            
            if(type === 'error') {
                iconBox.className = 'w-16 h-16 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 bg-red-100 text-red-500';
                icon.className = 'fa-solid fa-triangle-exclamation';
                okBtn.className = 'flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 font-medium';
            } else {
                iconBox.className = 'w-16 h-16 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 bg-indigo-100 text-indigo-500';
                icon.className = 'fa-solid fa-bell';
                okBtn.className = 'flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium';
            }
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.promptDelete = function(type, id) {
            const isTask = type === 'task';
            document.getElementById('confirm-title').textContent = isTask ? '일정을 삭제하시겠습니까?' : `'${categories[id]?.name}' 분류를 삭제하시겠습니까?`;
            document.getElementById('confirm-desc').textContent = isTask ? '삭제된 일정은 복구할 수 없습니다.' : '(기존 일정은 유지되나, 색상이 초기화됩니다)';
            
            const iconBox = document.getElementById('confirm-icon-box');
            const icon = document.getElementById('confirm-icon');
            const okBtn = document.getElementById('confirm-ok-btn');
            
            iconBox.className = 'w-16 h-16 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 bg-red-100 text-red-500';
            icon.className = 'fa-solid fa-trash-can';
            okBtn.className = 'flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 font-medium';
            document.getElementById('confirm-cancel-btn').classList.remove('hidden');

            pendingConfirmAction = async () => {
                if(!currentUser) return;
                try {
                    if (type === 'task') {
                        await deleteDoc(doc(db, 'daily_work', currentUser.uid, 'daily', id.toString()));
                    } else if (type === 'category') {
                        await deleteDoc(doc(db, 'daily_work', currentUser.uid, 'categories', id.toString()));
                    }
                } catch (err) {} finally {
                    window.closeConfirmModal();
                }
            };
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirmModal = function() {
            document.getElementById('confirm-modal').classList.add('hidden');
            pendingConfirmAction = null;
        };

        window.executeConfirmAction = function() {
            if (pendingConfirmAction) pendingConfirmAction();
            else window.closeConfirmModal();
        };

        window.switchView = function(viewId) {
            currentView = viewId;
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active-flex', 'active-block'));

                document.getElementById('nav-' + nav).className = 'flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-xl font-medium transition-colors';
            });
            document.getElementById('nav-' + viewId).className = 'flex items-center gap-3 px-4 py-3 bg-indigo-50 text-indigo-600 rounded-xl font-medium transition-colors';

            const activeViewEl = document.getElementById('view-' + viewId);
            if(viewId === 'dashboard') activeViewEl.classList.add('active-flex');
            else activeViewEl.classList.add('active-block');

            updateAllUI();
        }

        window.changeMonth = async function(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            await fetchKoreanHolidays(currentDate.getFullYear()); 
            updateAllUI();
        };

        window.resetToToday = async function() {
            currentDate = new Date();
            selectedDate = new Date();
            weeklyBrowseDate = new Date();
            allTasksDate = new Date();
            await fetchKoreanHolidays(currentDate.getFullYear());
            updateAllUI();
        };

        window.selectDay = function(dateString) {
            selectedDate = new Date(dateString);
            weeklyBrowseDate = new Date(dateString);

            else updateAllUI();

            weeklyBrowseDate.setDate(weeklyBrowseDate.getDate() + (offset * 7));

        }

        window.openMonthPicker = function() {
            pickingMonthYear = currentDate.getFullYear();
            renderMonthPickerGrid();
            document.getElementById('month-picker-modal').classList.remove('hidden');
        };
        window.closeMonthPicker = function() { document.getElementById('month-picker-modal').classList.add('hidden'); };
        
        window.selectMonthFromPicker = async function(monthIndex) {
            currentDate = new Date(pickingMonthYear, monthIndex, 1);
            await fetchKoreanHolidays(currentDate.getFullYear());
            updateAllUI();
            window.closeMonthPicker();
        };

        window.openWeekPicker = function() {
            const start = new Date(weeklyBrowseDate);
            start.setDate(start.getDate() - start.getDay());
            const weekInfo = getWeekNumber(start);
            pickingWeekYear = weekInfo.year;
            renderWeekPickerGrid();
            document.getElementById('week-picker-modal').classList.remove('hidden');
        };
        window.closeWeekPicker = function() { document.getElementById('week-picker-modal').classList.add('hidden'); };

        window.selectWeekFromPicker = function(week) {
            weeklyBrowseDate = getDateOfISOWeek(week, pickingWeekYear);
            if (currentView !== 'dashboard') window.switchView('dashboard');
            else renderWeekly();
            window.closeWeekPicker();
        };

        window.changePickerYear = function(offset, type) {
            if(type === 'month') { pickingMonthYear += offset; renderMonthPickerGrid(); }
            if(type === 'week') { pickingWeekYear += offset; renderWeekPickerGrid(); }
        };

        window.setAllTasksMode = function(mode) {
            allTasksMode = mode;
            ['week', 'month', 'year'].forEach(m => {
                const btn = document.getElementById(`tab-alltasks-${m}`);
                if(m === mode) btn.className = 'px-4 py-1.5 rounded-md text-sm font-bold transition-all bg-white shadow-sm text-indigo-600';
                else btn.className = 'px-4 py-1.5 rounded-md text-sm font-bold transition-all text-gray-500 hover:text-gray-700 hover:bg-gray-200';
            });
            renderAllTasks();
        };

        window.changeAllTasksPeriod = function(offset) {
            if (allTasksMode === 'year') allTasksDate.setFullYear(allTasksDate.getFullYear() + offset);
            else if (allTasksMode === 'month') allTasksDate.setMonth(allTasksDate.getMonth() + offset);
            else if (allTasksMode === 'week') allTasksDate.setDate(allTasksDate.getDate() + (offset * 7));
            renderAllTasks();
        };

        window.setStartTimeToNow = function() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('task-start').value = `${h}:${m}`;
            document.getElementById('task-end').value = ''; 
        };

        window.addTimeToEnd = function(mins) {
            const startVal = document.getElementById('task-start').value;
            if (!startVal) {
                window.setStartTimeToNow();
                setTimeout(() => window.addTimeToEnd(mins), 50);
                return;
            }
            const [h, m] = startVal.split(':').map(Number);
            const end = new Date();
            end.setHours(h, m + mins, 0, 0);
            const eh = String(end.getHours()).padStart(2, '0');
            const em = String(end.getMinutes()).padStart(2, '0');
            document.getElementById('task-end').value = `${eh}:${em}`;
        };

        window.openTaskModal = function() {
            if(!currentUser) {
                window.showCustomAlert('로그인 필요', '로그인을 하셔야 일정을 저장할 수 있습니다.', 'error');
                return;
            }
            document.getElementById('add-task-form').reset();
            document.getElementById('edit-task-id').value = '';
            document.getElementById('task-modal-title').textContent = '새 업무 기록하기';
            document.getElementById('task-date').value = formatDateString(selectedDate);
            
            renderCategoryDropdown();
            document.getElementById('task-modal').classList.remove('hidden');
        };
        window.closeTaskModal = function() { document.getElementById('task-modal').classList.add('hidden'); };

        window.editTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if(!task) return;
            document.getElementById('edit-task-id').value = task.id;
            document.getElementById('task-modal-title').textContent = '업무 수정하기';
            document.getElementById('task-date').value = task.date;
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-start').value = task.startTime;
            document.getElementById('task-end').value = task.endTime;
            renderCategoryDropdown();
            document.getElementById('task-category').value = task.category;
            document.getElementById('task-modal').classList.remove('hidden');
        };

        window.toggleTask = async function(id) {
            if(!currentUser) return;
            const task = tasks.find(t => t.id === id);
            if(task) {
                await setDoc(doc(db, 'daily_work', currentUser.uid, 'daily', id.toString()), { completed: !task.completed }, { merge: true });
            }
        };

        window.openCategoryManager = function() {
            if(!currentUser) {
                window.showCustomAlert('접근 불가', '로그인이 필요합니다.', 'error');
                return;
            }
            renderCategoryManagerList();
            window.resetCategoryForm();
            document.getElementById('category-modal').classList.remove('hidden');
        };
        window.closeCategoryManager = function() {
            document.getElementById('category-modal').classList.add('hidden');
            renderCategoryDropdown();
        };

        window.resetCategoryForm = function() {
            document.getElementById('category-form').reset();
            document.getElementById('edit-cat-id').value = '';
            document.getElementById('category-form-title').textContent = '새 분류 추가';
            document.getElementById('cat-submit-btn').textContent = '추가하기';
            document.getElementById('cat-cancel-btn').classList.add('hidden');
            const firstColorBtn = document.getElementById('color-picker').firstChild;
            if(firstColorBtn) window.selectColor(firstColorBtn, Object.keys(colorPalette)[0]);
        };

        window.editCategory = function(key) {
            const cat = categories[key];
            if(!cat) return;
            document.getElementById('edit-cat-id').value = key;
            document.getElementById('cat-name').value = cat.name;
            document.getElementById('category-form-title').textContent = '분류 수정하기';
            document.getElementById('cat-submit-btn').textContent = '수정 완료';
            document.getElementById('cat-cancel-btn').classList.remove('hidden');
            const colorIndex = Object.keys(colorPalette).indexOf(cat.colorBase);
            if(colorIndex > -1) window.selectColor(document.getElementById('color-picker').children[colorIndex], cat.colorBase);

        window.selectColor = function(btnElement, colorKey) {
            const buttons = document.getElementById('color-picker').children;
            for(let btn of buttons) btn.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400', 'scale-110');
            btnElement.classList.add('ring-2', 'ring-offset-2', 'ring-gray-400', 'scale-110');
            document.getElementById('cat-color').value = colorKey;
        };

        window.selectCategory = function(btnElement, categoryKey) {
            if(!btnElement) return;
            const buttons = document.getElementById('category-selector').children;
            for(let btn of buttons) {
                btn.classList.remove('opacity-100', 'ring-2', 'ring-offset-1', 'ring-indigo-500');
                btn.classList.add('opacity-60');
            }
            btnElement.classList.remove('opacity-60');
            btnElement.classList.add('opacity-100', 'ring-2', 'ring-offset-1', 'ring-indigo-500');
            document.getElementById('task-category').value = categoryKey;
        };

        // --- 내부 렌더링 로직 (전역 바인딩 불필요) ---
        function updateAllUI() {
            renderHeader();
            if(currentView === 'dashboard') {
                renderCalendar();
                renderWeekly();
                renderTimeline();
            } else if(currentView === 'all-tasks') {
                renderAllTasks();
            } else if(currentView === 'statistics') {
                renderStatistics();
            }
        }

        function renderHeader() {
            const y = currentDate.getFullYear();
            const m = currentDate.getMonth() + 1;
            document.getElementById('header-month-display').textContent = `${y}년 ${m}월`;
            const selOptions = { month: 'long', day: 'numeric', weekday: 'short' };
            let dateDisplay = selectedDate.toLocaleDateString('ko-KR', selOptions);
            if (formatDateString(selectedDate) === formatDateString(new Date())) {
                dateDisplay = `<span class="text-indigo-600 font-extrabold mr-1">오늘</span> ` + dateDisplay;
            }
            document.getElementById('selected-date-display').innerHTML = dateDisplay + ' 타임라인';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = formatDateString(new Date());
            const selectedStr = formatDateString(selectedDate);

            for (let i = 0; i < firstDay; i++) { grid.innerHTML += `<div class="p-2 border border-transparent"></div>`; }

            for (let day = 1; day <= daysInMonth; day++) {
                const currentCellDate = new Date(year, month, day);
                const dateStr = formatDateString(currentCellDate);
                const dayOfWeek = currentCellDate.getDay();
                let textColor = 'text-gray-700';
                let isHoliday = false;
                let holidayName = '';
                
                if (publicHolidaysCache[year] && publicHolidaysCache[year][dateStr]) {
                    isHoliday = true;
                    holidayName = publicHolidaysCache[year][dateStr];
                }

                if (dayOfWeek === 0 || isHoliday) textColor = 'text-red-500';
                else if (dayOfWeek === 6) textColor = 'text-blue-500';

                const isToday = dateStr === todayStr;
                const isSelected = dateStr === selectedStr;
                const dayTasks = tasks.filter(t => t.date === dateStr);
                let taskDots = '';
                dayTasks.slice(0, 3).forEach(t => {
                    const cat = categories[t.category] || { colorBase: 'zinc' };
                    const dotClass = colorPalette[cat.colorBase].dot;
                    taskDots += `<div class="w-1.5 h-1.5 rounded-full ${dotClass} opacity-80"></div>`;
                });
                if(dayTasks.length > 3) taskDots += `<div class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>`;

                const bgClass = isToday ? 'bg-indigo-50/50 border-indigo-400 border-2 shadow-sm' : (isSelected ? 'bg-gray-100 border-gray-300 shadow-inner' : 'hover:bg-gray-50 border-transparent');
                const todayBadge = isToday ? `<span class="absolute top-0 right-0 bg-indigo-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-bl-lg rounded-tr-md">오늘</span>` : '';
                if (isToday) textColor = 'text-indigo-700'; 
                const holidayLabel = isHoliday ? `<span class="text-[10px] text-red-500 font-bold truncate block w-full leading-none mt-0.5">${holidayName}</span>` : '';

                grid.innerHTML += `
                    <div onclick="window.selectDay('${dateStr}')" class="p-1 md:p-2 cursor-pointer transition-colors border rounded-xl relative flex flex-col h-full min-h-[50px] md:min-h-[60px] ${bgClass}">
                        ${todayBadge}
                        <span class="text-sm font-semibold mb-0.5 ${textColor}">${day}</span>
                        ${holidayLabel}
                        <div class="flex flex-wrap gap-1 mt-auto pt-1">
                            ${taskDots}
                        </div>
                    </div>
                `;
            }
        }

        function renderWeekly() {
            const container = document.getElementById('weekly-container');
            container.innerHTML = '';
            const start = new Date(weeklyBrowseDate);
            start.setDate(start.getDate() - start.getDay());
            const end = new Date(start);
            end.setDate(end.getDate() + 6); 

            const weekInfo = getWeekNumber(start);
            document.getElementById('weekly-week-number').textContent = `${weekInfo.year}년 ${weekInfo.week}주차`;
            document.getElementById('weekly-range-text').textContent = `${start.getMonth()+1}.${start.getDate()} ~ ${end.getMonth()+1}.${end.getDate()}`;

            const startStr = formatDateString(start);
            const endStr = formatDateString(end);
            const weeklyTasks = tasks.filter(t => t.date >= startStr && t.date <= endStr)
                                     .sort((a, b) => a.date.localeCompare(b.date) || a.startTime.localeCompare(b.startTime));

            if(weeklyTasks.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-400 py-6 text-sm">이 주간에는 등록된 일정이 없습니다.</div>';
                return;
            }

            let lastDate = '';
            weeklyTasks.forEach(task => {
                const cat = categories[task.category] || { name: '미지정', colorBase: 'zinc' };
                const cColors = colorPalette[cat.colorBase];
                const taskDateObj = new Date(task.date);
                const dayName = ['일', '월', '화', '수', '목', '금', '토'][taskDateObj.getDay()];
                
                if (task.date !== lastDate) {
                    container.innerHTML += `
                        <div class="text-xs font-bold text-gray-500 mt-4 mb-2 flex items-center gap-2">
                            ${taskDateObj.getMonth()+1}/${taskDateObj.getDate()} (${dayName})
                            <div class="flex-1 h-px bg-gray-100"></div>
                        </div>`;
                    lastDate = task.date;
                }

                container.innerHTML += `
                    <div class="flex items-center gap-3 p-2.5 rounded-lg border border-gray-100 hover:bg-gray-50 transition-colors group cursor-pointer" onclick="window.selectDay('${task.date}')">
                        <div class="w-2 h-2 rounded-full ${cColors.dot}"></div>
                        <div class="flex-1 min-w-0">
                            <h4 class="text-sm font-bold text-gray-800 truncate ${task.completed ? 'line-through text-gray-400' : ''}">${task.title}</h4>
                            <div class="flex items-center gap-2 text-xs text-gray-500 mt-0.5">
                                <span>${task.startTime}</span>
                                <span class="px-1.5 py-0.5 rounded bg-gray-100">${cat.name}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderMonthPickerGrid() {
            document.getElementById('picker-year-text').textContent = `${pickingMonthYear}년`;
            const grid = document.getElementById('picker-month-grid');
            grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                const isCurrent = (pickingMonthYear === currentDate.getFullYear() && i-1 === currentDate.getMonth());
                const bgClass = isCurrent ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-50 text-gray-700 hover:bg-indigo-50 hover:text-indigo-600';
                grid.innerHTML += `<button onclick="window.selectMonthFromPicker(${i-1})" class="py-3.5 rounded-xl font-bold transition-all text-sm md:text-base ${bgClass}">${i}월</button>`;
            }
        }

        function renderWeekPickerGrid() {
            document.getElementById('picker-week-year-text').textContent = `${pickingWeekYear}년`;
            const grid = document.getElementById('picker-week-grid');
            grid.innerHTML = '';
            const totalWeeks = getWeeksInYear(pickingWeekYear);
            const start = new Date(weeklyBrowseDate);
            start.setDate(start.getDate() - start.getDay());
            const currentWeekInfo = getWeekNumber(start);

            for(let i=1; i<=totalWeeks; i++) {
                const isCurrent = (pickingWeekYear === currentWeekInfo.year && i === currentWeekInfo.week);
                const bgClass = isCurrent ? 'bg-indigo-600 text-white shadow-md scale-110' : 'bg-gray-50 text-gray-700 hover:bg-indigo-50 hover:text-indigo-600';
                const weekStart = getDateOfISOWeek(i, pickingWeekYear);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                const titleRange = `${weekStart.getMonth()+1}월 ${weekStart.getDate()}일 ~ ${weekEnd.getMonth()+1}월 ${weekEnd.getDate()}일`;
                grid.innerHTML += `<button onclick="window.selectWeekFromPicker(${i})" title="${titleRange}" class="w-10 h-10 md:w-11 md:h-11 mx-auto rounded-full font-bold transition-all flex items-center justify-center text-sm md:text-base ${bgClass}">${i}</button>`;
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            const dateStr = formatDateString(selectedDate);
            let dayTasks = tasks.filter(t => t.date === dateStr);
            dayTasks.sort((a, b) => a.startTime.localeCompare(b.startTime));

            const completedCount = dayTasks.filter(t => t.completed).length;
            document.getElementById('task-progress-text').textContent = `총 ${dayTasks.length}개 작업 중 ${completedCount}개 완료`;

                container.innerHTML = '<div class="text-center text-gray-400 py-10 text-sm flex flex-col items-center"><i class="fa-regular fa-folder-open text-3xl mb-3 opacity-50"></i>이 날의 일정이 없습니다.</div>';
                return;
            }

            dayTasks.forEach(task => {
                const cat = categories[task.category] || { name: '삭제된 분류', colorBase: 'zinc', icon: 'fa-tag' };
                const cColors = colorPalette[cat.colorBase] || colorPalette['zinc'];
                const isDone = task.completed;
                
                const itemHtml = `
                    <div class="relative flex items-start gap-4 group transition-all duration-300 pl-1 ${isDone ? 'opacity-60' : ''}">
                        <div class="flex items-center justify-center w-8 h-8 rounded-full border-[3px] border-white ${cColors.color} shrink-0 shadow-sm z-10 mt-1 cursor-pointer hover:scale-110 transition-transform" onclick="window.toggleTask('${task.id}')">
                            <i class="fa-solid ${isDone ? 'fa-check text-green-600' : cat.icon} text-xs"></i>
                        </div>
                        <div class="flex-1 p-3.5 rounded-xl border ${cColors.color} bg-white shadow-sm flex flex-col gap-1.5 hover:shadow-md transition-shadow">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-bold mb-1 ${cColors.color} border-none bg-opacity-50 uppercase tracking-wider">${cat.name}</span>
                                    <h4 class="font-bold text-gray-800 text-[15px] leading-tight ${isDone ? 'line-through text-gray-500' : ''}">${task.title}</h4>
                                </div>
                                <div class="flex gap-1">
                                    <button onclick="window.editTask('${task.id}')" class="text-gray-300 hover:text-indigo-500 transition-colors p-1"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="window.promptDelete('task', '${task.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-1"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            </div>
                            <div class="flex items-center text-xs text-gray-500 font-medium">
                                <i class="fa-regular fa-clock mr-1"></i> ${task.startTime} - ${task.endTime}
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHtml);
            });
        }

        function renderAllTasks() {
            let startStr, endStr, displayTitle;
            if (allTasksMode === 'year') {
                const y = allTasksDate.getFullYear();
                startStr = `${y}-01-01`; endStr = `${y}-12-31`; displayTitle = `${y}년`;
            } else if (allTasksMode === 'month') {
                const y = allTasksDate.getFullYear(); const m = allTasksDate.getMonth();
                startStr = formatDateString(new Date(y, m, 1)); endStr = formatDateString(new Date(y, m + 1, 0)); displayTitle = `${y}년 ${m + 1}월`;
            } else if (allTasksMode === 'week') {
                const start = new Date(allTasksDate); start.setDate(start.getDate() - start.getDay());
                const end = new Date(start); end.setDate(end.getDate() + 6);
                startStr = formatDateString(start); endStr = formatDateString(end);
                const weekInfo = getWeekNumber(start); displayTitle = `${weekInfo.year}년 ${weekInfo.week}주차`;
            }

            document.getElementById('all-tasks-period-display').textContent = displayTitle;
            const filteredTasks = tasks.filter(t => t.date >= startStr && t.date <= endStr);
            document.getElementById('all-tasks-count').textContent = `총 ${filteredTasks.length}건`;

            const tbody = document.getElementById('all-tasks-tbody');
            tbody.innerHTML = '';

            if(filteredTasks.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-400">해당 기간(${displayTitle})에 등록된 업무가 없습니다.</td></tr>`;
                return;
            }

            const sortedTasks = [...filteredTasks].sort((a, b) => b.date.localeCompare(a.date) || b.startTime.localeCompare(a.startTime));

            sortedTasks.forEach(task => {
                const cat = categories[task.category] || { name: '미지정', colorBase: 'zinc' };
                const cColors = colorPalette[cat.colorBase] || colorPalette['zinc'];
                const statusHtml = task.completed 
                    ? '<span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-bold">완료</span>'
                    : '<span class="px-2 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold">진행중</span>';

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition-colors cursor-pointer group" onclick="window.selectDay('${task.date}')">
                        <td class="p-4 text-gray-600 font-medium">${task.date}</td>
                        <td class="p-4 text-gray-500 text-xs"><i class="fa-regular fa-clock mr-1"></i>${task.startTime} - ${task.endTime}</td>
                        <td class="p-4">
                            <span class="inline-flex items-center gap-1.5 px-2 py-1 rounded text-xs font-bold ${cColors.color} border-none bg-opacity-30">
                                <div class="w-1.5 h-1.5 rounded-full ${cColors.dot}"></div> ${cat.name}
                            </span>
                        </td>
                        <td class="p-4 font-bold text-gray-800 ${task.completed ? 'line-through text-gray-400' : ''}">${task.title}</td>
                        <td class="p-4 text-center" onclick="event.stopPropagation(); window.toggleTask('${task.id}')">${statusHtml}</td>
                        <td class="p-4 text-right">
                            <button onclick="event.stopPropagation(); window.editTask('${task.id}')" class="text-gray-400 hover:text-indigo-600 p-1 mx-1"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="event.stopPropagation(); window.promptDelete('task', '${task.id}')" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        function renderStatistics() {
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.completed).length;
            const completionRate = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
            
            let totalHoursLogged = 0;
            const catStats = {};

            for (const key in categories) {
                catStats[key] = { count: 0, hours: 0, name: categories[key].name, colorBase: categories[key].colorBase };
            }

            tasks.forEach(task => {
                const duration = calculateDuration(task.startTime, task.endTime);
                totalHoursLogged += duration;
                const catKey = categories[task.category] ? task.category : 'etc'; 
                if(catStats[catKey]) {
                    catStats[catKey].count++;
                    catStats[catKey].hours += duration;
                }
            });

            document.getElementById('stat-total-tasks').textContent = `${totalTasks}건`;
            document.getElementById('stat-completion-rate').textContent = `${completionRate}%`;
            document.getElementById('stat-total-hours').textContent = `${totalHoursLogged.toFixed(1)}시간`;

            const container = document.getElementById('stat-categories-container');
            container.innerHTML = '';
            const sortedCats = Object.values(catStats).sort((a, b) => b.hours - a.hours);

            sortedCats.forEach(stat => {
                if(stat.count === 0) return; 
                const cColors = colorPalette[stat.colorBase] || colorPalette['zinc'];
                const hoursPercent = totalHoursLogged > 0 ? (stat.hours / totalHoursLogged) * 100 : 0;
                container.innerHTML += `
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <span class="font-bold text-gray-700 flex items-center gap-2">
                                <div class="w-2.5 h-2.5 rounded-full ${cColors.dot}"></div> ${stat.name}
                            </span>
                            <div class="text-right">
                                <span class="text-sm font-bold text-gray-800">${stat.hours.toFixed(1)}h</span>
                                <span class="text-xs text-gray-500 ml-1">(${stat.count}건)</span>
                            </div>
                        </div>
                        <div class="w-full bg-gray-100 rounded-full h-3.5 overflow-hidden">
                            <div class="h-3.5 rounded-full ${cColors.dot} transition-all duration-1000" style="width: ${hoursPercent}%"></div>
                        </div>
                    </div>
                `;
            });
            if (totalTasks === 0) container.innerHTML = '<div class="col-span-2 text-center text-gray-400 py-10">데이터가 부족합니다. 업무를 추가해주세요.</div>';
        }

        function renderCategoryDropdown() {
            const selector = document.getElementById('task-category');
            selector.innerHTML = '';
            for (const [key, cat] of Object.entries(categories)) {
                selector.innerHTML += `<option value="${key}">${cat.name}</option>`;
            }
        }

        function renderCategoryManagerList() {
            const container = document.getElementById('category-list');
            container.innerHTML = '';
            for (const [key, cat] of Object.entries(categories)) {
                const colors = colorPalette[cat.colorBase] || colorPalette['zinc'];
                container.innerHTML += `
                    <div class="flex items-center justify-between p-3 border border-gray-100 rounded-lg hover:bg-gray-50 bg-white shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full ${colors.color} flex items-center justify-center text-sm"><i class="fa-solid ${cat.icon}"></i></div>
                            <span class="font-bold text-gray-700 text-sm">${cat.name}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.editCategory('${key}')" class="text-gray-400 hover:text-indigo-600 p-1"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="window.promptDelete('category', '${key}')" class="text-gray-400 hover:text-red-500 p-1"><i class="fa-solid fa-trash-can text-sm"></i></button>
                        </div>
                    </div>
                `;
            }
        }

        function initColorPicker() {
            const container = document.getElementById('color-picker');
            container.innerHTML = '';
            for (const [key, val] of Object.entries(colorPalette)) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = `w-6 h-6 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 transition-transform hover:scale-110`;
                btn.style.backgroundColor = val.hex;
                btn.onclick = () => window.selectColor(btn, key);
                container.appendChild(btn);
            }
        }
    </script>
</body>
</html>
