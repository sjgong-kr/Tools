<!DOCTYPE html>
<html lang="ko">
<head>

<body class="text-gray-800">

    <!-- 로그인 화면 -->
    <div id="login-screen" class="fixed inset-0 bg-gray-100 z-[60] flex items-center justify-center">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm mx-4 border border-gray-100">
            <div class="text-center mb-8">
                <div class="bg-gradient-to-tr from-purple-400 to-indigo-500 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg text-white">
                    <i class="fas fa-gem text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">JINA 레진 아트</h2>
                <p class="text-sm text-gray-500 mt-1 font-medium">관리자 전용 로그인</p>
            </div>
            <form id="login-form" class="space-y-4">

                </div>

    <!-- 앱 로딩 화면 -->

    <!-- 범용 알림 모달 -->

    <!-- 수정 전용 모달 -->

                    <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-purple-600 to-blue-500">JINA 레진 아트</h1>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                                    <label class="block text-xs font-bold text-red-400 mb-1 ml-1">구매처 (선택)</label>
                                    <select id="input-vendor" class="w-full bg-white border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-red-400 outline-none shadow-sm"></select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-red-400 mb-1 ml-1">항목명</label>

                            <button type="submit" id="submit-btn" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-black py-4 rounded-3xl transition-all shadow-md active:scale-95">
                                <i class="fas fa-plus-circle mr-2"></i> 등록하기
                            </button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white p-7 rounded-3xl shadow-sm border border-gray-100 min-h-[600px]">
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8 border-b pb-6">
                            <h2 class="text-xl font-black text-gray-800">전체 거래 내역</h2>
                            <div class="flex items-center gap-2 bg-gray-50 p-2 rounded-2xl">
                                <input type="date" id="filter-start" class="bg-transparent border-none text-xs font-bold focus:ring-0">
                                <span class="text-gray-300">~</span>
                                <input type="date" id="filter-end" class="bg-transparent border-none text-xs font-bold focus:ring-0">

                </div>

        <!-- [탭 2] 제품 관리 -->
        <div id="tab-products" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

                    <div class="bg-white p-7 rounded-3xl border border-gray-100 shadow-sm">

                        <form id="product-form" class="space-y-4">
                            <input type="text" id="prod-code" placeholder="제품 코드 (C-001)" required class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold">
                            <input type="text" id="prod-name" placeholder="제품명" required class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold">
                            <input type="number" id="prod-price" placeholder="기본 판매가" required class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold">
                            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl shadow-md">제품 추가</button>

                    </div>
                </div>
                <div class="md:col-span-2">
                    <div class="bg-white p-7 rounded-3xl border border-gray-100 shadow-sm min-h-[400px]">
                        <h2 class="text-lg font-black mb-6">제품 목록</h2>
                        <div class="overflow-hidden">
                            <table class="w-full text-left">
                                <tbody id="products-table-body" class="divide-y divide-gray-50"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- [탭 3] 판매처 관리 -->
        <div id="tab-channels" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="md:col-span-1">
                    <div class="bg-white p-7 rounded-3xl border border-gray-100 shadow-sm">
                        <h2 class="text-lg font-black mb-6">판매처 추가</h2>
                        <form id="channel-form" class="space-y-4">
                            <input type="text" id="chan-name" placeholder="판매처 이름" required class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold">
                            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl">추가하기</button>
                        </form>
                    </div>
                </div>
                <div class="md:col-span-2">
                    <div class="bg-white p-7 rounded-3xl border border-gray-100 shadow-sm min-h-[400px]">
                        <h2 class="text-lg font-black mb-6">판매처 목록</h2>
                        <div id="channels-table-body" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- [탭 4] 구매처 관리 -->
        <div id="tab-vendors" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="md:col-span-1">
                    <div class="bg-white p-7 rounded-3xl border border-gray-100 shadow-sm">
                        <h2 class="text-lg font-black mb-6">구매처 추가</h2>
                        <form id="vendor-form" class="space-y-4">
                            <input type="text" id="ven-name" placeholder="구매처 이름" required class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold">
                            <button type="submit" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl">추가하기</button>
                        </form>
                    </div>
                </div>
                <div class="md:col-span-2">
                    <div class="bg-white p-7 rounded-3xl border border-gray-100 shadow-sm min-h-[400px]">
                        <h2 class="text-lg font-black mb-6">구매처 목록</h2>
                        <div id="vendors-table-body" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- [탭 5] 통계 분석 -->
        <div id="tab-stats" class="tab-content hidden space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <h2 class="text-xl font-black mb-8 flex items-center gap-2">
                        <i class="fas fa-store text-blue-500"></i> 판매처별 매출
                    </h2>
                    <div id="stats-container" class="space-y-6"></div>
                </div>
                <div class="bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
                    <h2 class="text-xl font-black mb-8 flex items-center gap-2">
                        <i class="fas fa-truck text-red-400"></i> 구매처별 지출
                    </h2>
                    <div id="vendor-stats-container" class="space-y-6"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBD5-AJDFJKsneHyqH70SlNU9VixDAHl3o",
            authDomain: "openzeroc.firebaseapp.com",
            projectId: "openzeroc",
            storageBucket: "openzeroc.firebasestorage.app",
            messagingSenderId: "465944510778",
            appId: "1:465944510778:web:df0d19b7c6b98d129f5003",
            measurementId: "G-M4K79K2XPG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allEntries = []; 
        let allProducts = [];
        let allChannels = [];
        let allVendors = [];
        let unsubs = [];
        let currentEditingItem = null; // 수정 중인 항목 추적

        const formatMoney = (num) => new Intl.NumberFormat('ko-KR').format(num) + '원';
        const showModal = (msg) => { document.getElementById('custom-modal-text').innerText = msg; document.getElementById('custom-modal').classList.remove('hidden'); };
        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');

        // 수정 모달 제어
        window.openEditModal = (type, item) => {
            currentEditingItem = { type, ...item };
            const container = document.getElementById('edit-fields-container');
            container.innerHTML = '';
            document.getElementById('edit-modal-title').innerText = `${type === 'product' ? '제품' : type === 'channel' ? '판매처' : '구매처'} 정보 수정`;

            if (type === 'product') {
                container.innerHTML = `
                    <input type="text" id="edit-prod-code" value="${item.code}" placeholder="제품 코드" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold focus:ring-2 focus:ring-purple-400">
                    <input type="text" id="edit-prod-name" value="${item.name}" placeholder="제품명" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold focus:ring-2 focus:ring-purple-400">
                    <input type="number" id="edit-prod-price" value="${item.price}" placeholder="기본 판매가" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold focus:ring-2 focus:ring-purple-400">
                `;
            } else {
                container.innerHTML = `
                    <input type="text" id="edit-common-name" value="${item.name}" placeholder="이름" class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3.5 font-bold focus:ring-2 focus:ring-purple-400">
                `;
            }
            document.getElementById('edit-modal').classList.remove('hidden');
        };

        window.closeEditModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
            currentEditingItem = null;
        };

        // 수정 저장 로직
        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser || !currentEditingItem) return;

            const { type, id } = currentEditingItem;
            const docRef = doc(db, 'jina_resin', currentUser.uid, type === 'product' ? 'products' : type === 'channel' ? 'channels' : 'vendors', id);
            let updateData = {};

            if (type === 'product') {
                updateData = {
                    code: document.getElementById('edit-prod-code').value,
                    name: document.getElementById('edit-prod-name').value,
                    price: Number(document.getElementById('edit-prod-price').value)
                };
            } else {
                updateData = {
                    name: document.getElementById('edit-common-name').value
                };
            }

            try {
                await updateDoc(docRef, updateData);
                closeEditModal();
                showModal("수정되었습니다.");
            } catch (err) {
                console.error(err);
                showModal("수정에 실패했습니다.");
            }
        });

        // 인증 유지
        setPersistence(auth, browserLocalPersistence);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                subscribeToData();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('login-id').value;
            const pw = document.getElementById('login-pw').value;
            const syncEmail = `${id}@resin.app`;

            if (id === 'jina' && pw === 'jadu6486') {
                document.getElementById('loading-screen').classList.remove('hidden');
                try {
                    await signInWithEmailAndPassword(auth, syncEmail, pw);
                } catch (err) {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-login-credentials' || err.code === 'auth/invalid-credential') {
                        try { await createUserWithEmailAndPassword(auth, syncEmail, pw); } catch (ce) { console.error(ce); showModal("계정 생성 실패"); }
                    } else { showModal("로그인 오류: " + err.code); }
                } finally { document.getElementById('loading-screen').classList.add('hidden'); }
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        window.handleLogout = () => { if(confirm("로그아웃 하시겠습니까?")) signOut(auth); };

        function subscribeToData() {
            if (!currentUser) return;
            unsubs.forEach(unsub => unsub());
            unsubs = [];

            const userPath = (col) => collection(db, 'jina_resin', currentUser.uid, col);

            unsubs.push(onSnapshot(userPath('entries'), (s) => { allEntries = s.docs.map(d => ({id: d.id, ...d.data()})); renderApp(); }));
            unsubs.push(onSnapshot(userPath('products'), (s) => { 
                allProducts = s.docs.map(d => ({id: d.id, ...d.data()})); 
                const select = document.getElementById('input-product');
                select.innerHTML = '<option value="">제품 선택</option>' + allProducts.map(p => `<option value="${p.id}">${p.name} (${formatMoney(p.price)})</option>`).join('');
                renderProducts();
            }));
            unsubs.push(onSnapshot(userPath('channels'), (s) => { 
                allChannels = s.docs.map(d => ({id: d.id, ...d.data()})); 
                document.getElementById('input-channel').innerHTML = '<option value="">판매처 선택</option>' + allChannels.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                renderChannels();
            }));
            unsubs.push(onSnapshot(userPath('vendors'), (s) => { 
                allVendors = s.docs.map(d => ({id: d.id, ...d.data()})); 
                document.getElementById('input-vendor').innerHTML = '<option value="">구매처 선택</option>' + allVendors.map(v => `<option value="${v.name}">${v.name}</option>`).join('');
                renderVendors();
            }));
        }

        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => { 
                b.classList.remove('text-purple-600', 'border-purple-600');
                b.classList.add('text-gray-400', 'border-transparent');
            });
            const btn = document.getElementById(`tab-btn-${tab}`);
            btn.classList.remove('text-gray-400', 'border-transparent');
            btn.classList.add('text-purple-600', 'border-purple-600');
        };

        document.getElementById('input-type').addEventListener('change', (e) => {
            const isInc = e.target.value === 'income';
            document.getElementById('income-group').classList.toggle('hidden', !isInc);
            document.getElementById('expense-group').classList.toggle('hidden', isInc);
        });

        const calculate = () => {
            const up = Number(document.getElementById('input-unit-price').value) || 0;
            const q = Number(document.getElementById('input-quantity').value) || 1;
            if(up > 0) document.getElementById('input-amount').value = up * q;
        };
        document.getElementById('input-quantity').addEventListener('input', calculate);
        document.getElementById('input-unit-price').addEventListener('input', calculate);
        document.getElementById('input-product').addEventListener('change', (e) => {
            const p = allProducts.find(x => x.id === e.target.value);
            if(p) { document.getElementById('input-unit-price').value = p.price; calculate(); }
        });

        document.getElementById('entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const type = document.getElementById('input-type').value;
            let name = "";
            let channel = null, vendor = null;

            if(type === 'income') {
                const pId = document.getElementById('input-product').value;
                if(!pId) return showModal("제품을 선택하세요.");
                name = allProducts.find(x => x.id === pId).name;
                channel = document.getElementById('input-channel').value;
            } else {
                name = document.getElementById('input-expense-name').value;
                vendor = document.getElementById('input-vendor').value;
            }

            try {
                await addDoc(collection(db, 'jina_resin', currentUser.uid, 'entries'), {
                    type, name, channel, vendor,
                    date: document.getElementById('input-date').value,
                    unitPrice: Number(document.getElementById('input-unit-price').value),
                    quantity: Number(document.getElementById('input-quantity').value),
                    amount: Number(document.getElementById('input-amount').value),
                    createdAt: Date.now()
                });
                document.getElementById('entry-form').reset();
                document.getElementById('input-date').value = new Date().toISOString().split('T')[0];
            } catch (e) { showModal("저장 실패"); }
        });

        window.renderApp = () => {
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            let filtered = allEntries.filter(e => (!start || e.date >= start) && (!end || e.date <= end));
            filtered.sort((a,b) => b.date.localeCompare(a.date) || b.createdAt - a.createdAt);

            let inc = 0, exp = 0;
            const cStats = {}, vStats = {};

            const container = document.getElementById('entries-container');
            container.innerHTML = '';

            filtered.forEach(e => {
                if(e.type === 'income') { inc += e.amount; if(e.channel) cStats[e.channel] = (cStats[e.channel]||0) + e.amount; }
                else { exp += e.amount; if(e.vendor) vStats[e.vendor] = (vStats[e.vendor]||0) + e.amount; }

                const div = document.createElement('div');
                div.className = "p-5 bg-white border border-gray-100 rounded-3xl flex justify-between items-center group transition-all hover:border-purple-200 shadow-sm";
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center ${e.type==='income'?'bg-blue-50 text-blue-500':'bg-red-50 text-red-500'}">
                            <i class="fas fa-${e.type==='income'?'plus':'minus'} text-xs"></i>
                        </div>
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-xs font-black uppercase ${e.type==='income'?'text-blue-600':'text-red-600'}">${e.type==='income'?'판매':'지출'}</span>
                                <h4 class="font-bold text-gray-800">${e.name}</h4>
                                <span class="text-[10px] px-2 py-0.5 bg-gray-100 text-gray-500 rounded-full font-bold">${e.quantity}개</span>
                            </div>
                            <div class="flex items-center gap-3 text-[11px] text-gray-400 font-medium">
                                <span><i class="far fa-calendar mr-1"></i>${e.date}</span>
                                <span><i class="fas fa-tag mr-1"></i>${e.channel || e.vendor || '-'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="text-lg font-black ${e.type==='income'?'text-blue-600':'text-red-500'}">${e.type==='income'?'+':'-'} ${formatMoney(e.amount)}</p>
                        <button onclick="deleteEntry('${e.id}')" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all p-2">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });

            if(filtered.length === 0) document.getElementById('empty-state').classList.remove('hidden');
            else document.getElementById('empty-state').classList.add('hidden');

            document.getElementById('dash-income').innerText = formatMoney(inc);
            document.getElementById('dash-expense').innerText = formatMoney(exp);
            document.getElementById('dash-net').innerText = formatMoney(inc - exp);
        };

        const renderStats = (stats, total, cId, eId, color) => {
            const container = document.getElementById(cId);
            container.innerHTML = '';
            const keys = Object.keys(stats).sort((a,b) => stats[b] - stats[a]);
            if(keys.length === 0) return document.getElementById(eId).classList.remove('hidden');
            document.getElementById(eId).classList.add('hidden');
            keys.forEach(k => {
                const per = Math.round((stats[k]/total)*100);
                container.innerHTML += `
                    <div>
                        <div class="flex justify-between mb-2"><span class="font-bold text-sm">${k}</span><span class="text-xs font-bold text-gray-400">${formatMoney(stats[k])} (${per}%)</span></div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden"><div class="${color} h-full" style="width:${per}%"></div></div>
                    </div>
                `;
            });
        };

        const saveToPath = async (col, data, formId) => {
            try { await addDoc(collection(db, 'jina_resin', currentUser.uid, col), {...data, createdAt: Date.now()}); document.getElementById(formId).reset(); } 
            catch (e) { showModal("오류 발생"); }
        };
        document.getElementById('product-form').onsubmit = (e) => { e.preventDefault(); saveToPath('products', {code: document.getElementById('prod-code').value, name: document.getElementById('prod-name').value, price: Number(document.getElementById('prod-price').value)}, 'product-form'); };
        document.getElementById('channel-form').onsubmit = (e) => { e.preventDefault(); saveToPath('channels', {name: document.getElementById('chan-name').value}, 'channel-form'); };
        document.getElementById('vendor-form').onsubmit = (e) => { e.preventDefault(); saveToPath('vendors', {name: document.getElementById('ven-name').value}, 'vendor-form'); };

        window.deleteEntry = (id) => { if(confirm("내역을 삭제하시겠습니까?")) deleteDoc(doc(db, 'jina_resin', currentUser.uid, 'entries', id)); };
        window.deleteProduct = (id) => { if(confirm("제품을 삭제하시겠습니까?")) deleteDoc(doc(db, 'jina_resin', currentUser.uid, 'products', id)); };
        window.deleteChannel = (id) => { if(confirm("판매처를 삭제하시겠습니까?")) deleteDoc(doc(db, 'jina_resin', currentUser.uid, 'channels', id)); };
        window.deleteVendor = (id) => { if(confirm("구매처를 삭제하시겠습니까?")) deleteDoc(doc(db, 'jina_resin', currentUser.uid, 'vendors', id)); };

        window.renderProducts = () => {
            const body = document.getElementById('products-table-body');
            body.innerHTML = allProducts.map(p => `
                <tr class="hover:bg-gray-50 transition-all group">
                    <td class="p-4 font-mono text-xs text-gray-400">${p.code}</td>
                    <td class="p-4 font-bold text-sm">${p.name}</td>
                    <td class="p-4 text-blue-600 font-bold text-sm">${formatMoney(p.price)}</td>
                    <td class="p-4 text-right flex gap-2 justify-end">
                        <button onclick="openEditModal('product', ${JSON.stringify(p).replace(/"/g, '&quot;')})" class="text-gray-300 hover:text-purple-600 transition-all"><i class="fas fa-pen text-sm"></i></button>
                        <button onclick="deleteProduct('${p.id}')" class="text-gray-300 hover:text-red-500 transition-all"><i class="fas fa-trash-alt text-sm"></i></button>
                    </td>
                </tr>
            `).join('');
            document.getElementById('prod-empty-state').classList.toggle('hidden', allProducts.length > 0);
        };
        window.renderChannels = () => {
            document.getElementById('channels-table-body').innerHTML = allChannels.map(c => `
                <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center font-bold text-sm">
                    ${c.name} 
                    <div class="flex gap-3">
                        <button onclick="openEditModal('channel', ${JSON.stringify(c).replace(/"/g, '&quot;')})" class="text-gray-300 hover:text-purple-600"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteChannel('${c.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('chan-empty-state').classList.toggle('hidden', allChannels.length > 0);
        };
        window.renderVendors = () => {
            document.getElementById('vendors-table-body').innerHTML = allVendors.map(v => `
                <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center font-bold text-sm">
                    ${v.name} 
                    <div class="flex gap-3">
                        <button onclick="openEditModal('vendor', ${JSON.stringify(v).replace(/"/g, '&quot;')})" class="text-gray-300 hover:text-purple-600"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteVendor('${v.id}')" class="text-gray-300 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
            document.getElementById('ven-empty-state').classList.toggle('hidden', allVendors.length > 0);
        };

        const today = new Date();
        document.getElementById('input-date').value = today.toISOString().split('T')[0];
        document.getElementById('filter-start').value = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
        document.getElementById('filter-end').value = today.toISOString().split('T')[0];
    </script>
</body>
</html>
