<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로그램 통합 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');
        body {
            font-family: 'Gowun Dodum', sans-serif;
            background-color: #f8fafc;
        }
        /* 드래그 중인 카드 스타일 (반투명 및 테두리 효과) */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #eef2ff !important;
            border: 2px dashed #6366f1 !important;
            transform: scale(0.98);
        }
        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        /* 각 보드(구역)가 비어있을 때 표시할 텍스트 안내 */
        .board-container:empty::before {
            content: "앱을 이 곳으로 드래그 앤 드롭 하세요";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100px;
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: bold;
            grid-column: 1 / -1; /* 바둑판 전체 차지 */
        }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 헤더 영역 -->
        <div class="bg-gray-800 text-white p-6 rounded-2xl shadow-lg mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-6 h-6 text-indigo-400"></i> 내 프로그램 통합 대시보드
                </h1>
                <p class="text-gray-400 text-sm mt-1">파일 카드의 <b>[ ⋮⋮ ]</b> 아이콘을 잡아 구역 간에 자유롭게 끌어다 놓으세요. 카드를 클릭하면 상세 정보를 수정할 수 있습니다.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadSystemData()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
                </button>
                <button onclick="saveToFirebase()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm shadow-md border border-indigo-400">
                    <i data-lucide="save" class="w-4 h-4"></i> 클라우드(DB) 저장
                </button>
            </div>
        </div>

        <!-- 상태 표시줄 -->
        <div id="statusAlert" class="hidden mb-6 p-4 rounded-xl border font-bold text-sm flex items-center gap-2 transition-all shadow-sm">
            <i data-lucide="info" class="w-5 h-5"></i> <span id="statusText">상태 메시지</span>
        </div>

        <!-- 전체 데이터 로딩용 오버레이 (초기 상태) -->
        <div id="loadingIndicator" class="hidden py-20 text-center text-gray-400 flex flex-col items-center">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-3 text-indigo-400"></i>
            <p class="font-bold">데이터를 동기화하는 중입니다...</p>
        </div>

        <!-- 보드(구역) 컨테이너 그룹 -->
        <div id="boardWrapper" class="space-y-8">
            
            <!-- 1. 즐겨찾기 보드 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="star" class="w-6 h-6 text-yellow-500 fill-yellow-500"></i>
                    <h2 class="text-xl font-black text-gray-800">즐겨찾기 (상단 고정)</h2>
                </div>
                <div id="cat-favorite" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-yellow-50 rounded-2xl border-2 border-dashed border-yellow-200"></div>
            </div>

            <!-- 2. 업무 & 유틸리티 도구 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="briefcase" class="w-6 h-6 text-blue-500"></i>
                    <h2 class="text-xl font-black text-gray-800">업무 및 유틸리티</h2>
                </div>
                <div id="cat-tools" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-200"></div>
            </div>

            <!-- 3. 게임 & 취미 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="gamepad-2" class="w-6 h-6 text-green-500"></i>
                    <h2 class="text-xl font-black text-gray-800">게임 및 취미</h2>
                </div>
                <div id="cat-games" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-green-50 rounded-2xl border-2 border-dashed border-green-200"></div>
            </div>

            <!-- 4. 미분류 보관함 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="package-open" class="w-6 h-6 text-gray-500"></i>
                    <h2 class="text-xl font-black text-gray-800">미분류 보관함</h2>
                    <span id="uncategorizedCount" class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full font-bold ml-2"></span>
                </div>
                <div id="cat-uncategorized" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-gray-100 rounded-2xl border-2 border-dashed border-gray-300"></div>
            </div>

        </div>
    </div>

    <!-- Firebase 및 GitHub API 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 기존 Firebase 설정 유지
        const firebaseConfig = {
            apiKey: "AIzaSyBD5-AJDFJKsneHyqH70SlNU9VixDAHl3o",
            authDomain: "openzeroc.firebaseapp.com",
            projectId: "openzeroc",
            storageBucket: "openzeroc.firebasestorage.app",
            messagingSenderId: "465944510778",
            appId: "1:465944510778:web:df0d19b7c6b98d129f5003",
            databaseURL: "https://openzeroc-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const GITHUB_REPO = "sjgong-kr/Tools";
        const GITHUB_PAGES_BASE_URL = "https://sjgong-kr.github.io/Tools/";

        const BOARD_IDS = ['cat-favorite', 'cat-tools', 'cat-games', 'cat-uncategorized'];
        let sortableInstances = [];

        async function fetchGitHubFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error("API 오류");
                const data = await response.json();
                return data.filter(file => file.name.endsWith('.html'));
            } catch (error) {
                console.error(error);
                return [];
            }
        }

        async function fetchFirebaseData() {
            try {
                const docRef = doc(db, 'system_data', 'function_list');
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    return docSnap.data();
                }
                return {};
            } catch (error) {
                console.error("Firestore 읽기 오류:", error);
                return {};
            }
        }

        // 카드 토글 함수 (전역으로 노출)
        window.toggleCard = function(headerElement) {
            const cardBody = headerElement.nextElementSibling;
            const toggleIcon = headerElement.querySelector('.toggle-icon');

            if (cardBody.classList.contains('hidden')) {
                // 펼치기
                cardBody.classList.remove('hidden');
                toggleIcon.classList.add('rotate-180');
            } else {
                // 접기
                cardBody.classList.add('hidden');
                toggleIcon.classList.remove('rotate-180');
            }
        };

        window.loadSystemData = async function() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('boardWrapper').classList.add('hidden');

            const [fetchedFiles, firebaseData] = await Promise.all([
                fetchGitHubFiles(),
                fetchFirebaseData()
            ]);

            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('boardWrapper').classList.remove('hidden');

            BOARD_IDS.forEach(id => document.getElementById(id).innerHTML = '');

            const sortedFiles = fetchedFiles.sort((a, b) => {
                const keyA = a.name.replace(/\./g, '_');
                const keyB = b.name.replace(/\./g, '_');
                const orderA = firebaseData[keyA]?.order ?? 999; 
                const orderB = firebaseData[keyB]?.order ?? 999;
                return orderA - orderB;
            });

            let newFileCount = 0;

            sortedFiles.forEach((file) => {
                const fileKey = file.name.replace(/\./g, '_'); 
                const savedInfo = firebaseData[fileKey] || {};

                const appTitle = savedInfo.title || file.name.replace('.html', '');
                const appDesc = savedInfo.description || '';
                const appStatus = savedInfo.status || '활성';
                const appCategory = savedInfo.category || 'cat-uncategorized';
                if(appCategory === 'cat-uncategorized') newFileCount++;

                const appLink = GITHUB_PAGES_BASE_URL + file.name;
                let statusBadgeColor = appStatus === '활성' ? 'text-green-600' : (appStatus === '개발중' ? 'text-orange-500' : 'text-gray-400');
                const starColor = appCategory === 'cat-favorite' ? 'text-yellow-500 fill-yellow-500' : 'text-gray-300';

                // 카드 HTML 구조 변경: 항상 보이는 헤더(클릭 시 토글) + 숨겨진 바디 영역
                const fileHtml = `
                    <div class="file-card bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col overflow-hidden group" data-filename="${file.name}" data-filekey="${fileKey}">
                        
                        <!-- 클릭 가능한 카드 헤더 -->
                        <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex items-center justify-between transition-colors hover:bg-indigo-50 cursor-pointer" onclick="toggleCard(this)">
                            <div class="flex items-center gap-3 overflow-hidden w-full">
                                <!-- 드래그 손잡이 (클릭 이벤트 전파 방지) -->
                                <div class="drag-handle p-1 -ml-2 rounded hover:bg-indigo-200 text-gray-400 hover:text-indigo-600 transition cursor-grab" title="드래그해서 다른 구역으로 이동" onclick="event.stopPropagation()">
                                    <i data-lucide="grip-vertical" class="w-5 h-5"></i>
                                </div>
                                <i data-lucide="star" class="w-4 h-4 ${starColor} flex-shrink-0"></i>
                                <div class="flex flex-col truncate flex-1">
                                    <span class="font-bold text-gray-800 text-sm truncate" title="${appTitle}">${appTitle}</span>
                                    <span class="text-[10px] text-gray-400 truncate" title="${file.name}">${file.name}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                                <!-- 새 창 링크 (클릭 이벤트 전파 방지) -->
                                <a href="${appLink}" target="_blank" class="text-gray-400 hover:text-indigo-600 p-1.5 rounded hover:bg-white shadow-sm transition" title="새 창에서 앱 실행" onclick="event.stopPropagation()">
                                    <i data-lucide="external-link" class="w-4 h-4"></i>
                                </a>
                                <!-- 토글 화살표 아이콘 -->
                                <div class="text-gray-400 p-1 transition">
                                    <i data-lucide="chevron-down" class="toggle-icon w-5 h-5 transition-transform duration-300"></i>
                                </div>
                            </div>
                        </div>

                        <!-- 토글되는 상세 영역 (기본적으로 숨김 클래스 'hidden' 적용) -->
                        <div class="card-body hidden p-4 flex flex-col gap-3 bg-white">
                            <div>
                                <label class="flex justify-between items-center text-[11px] font-black text-gray-500 mb-1">
                                    <span>출력용 앱 이름</span>
                                    <i data-lucide="circle-dot" class="w-3 h-3 ${statusBadgeColor}"></i>
                                </label>
                                <input type="text" class="input-title w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm font-bold text-gray-800 transition" placeholder="예: 성장 일기장" value="${appTitle}">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[11px] font-black text-gray-500 mb-1">기능 상세 설명</label>
                                <textarea class="input-desc w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-xs h-20 resize-none text-gray-600 leading-relaxed transition" placeholder="기능이나 용도를 메모해두세요...">${appDesc}</textarea>
                            </div>
                            <div class="pt-2 border-t border-gray-100 mt-auto">
                                <select class="input-status w-full p-2 text-xs font-bold border border-gray-300 rounded-lg outline-none focus:border-indigo-500 bg-gray-50 focus:bg-white transition cursor-pointer">
                                    <option value="활성" ${appStatus === '활성' ? 'selected' : ''}>✅ 활성화 상태</option>
                                    <option value="개발중" ${appStatus === '개발중' ? 'selected' : ''}>🛠️ 개발 및 테스트 중</option>
                                    <option value="숨김" ${appStatus === '숨김' ? 'selected' : ''}>🔒 숨김 처리</option>
                                </select>
                            </div>
                        </div>

                    </div>
                `;
                
                const targetBoard = document.getElementById(appCategory) ? document.getElementById(appCategory) : document.getElementById('cat-uncategorized');
                targetBoard.insertAdjacentHTML('beforeend', fileHtml);
            });

            document.getElementById('uncategorizedCount').textContent = `${newFileCount}개 대기 중`;
            lucide.createIcons();
            initDragAndDrop(); 
            showStatus("모든 프로그램 목록과 분류를 성공적으로 불러왔습니다.", "success");
        };

        function initDragAndDrop() {
            sortableInstances.forEach(instance => instance.destroy());
            sortableInstances = [];

            BOARD_IDS.forEach(id => {
                const el = document.getElementById(id);
                const sortable = new Sortable(el, {
                    group: 'sharedBoard',
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    onEnd: function (evt) {
                        showStatus("위치/분류가 변경되었습니다. 잊지 말고 [저장] 버튼을 눌러주세요!", "info");
                    }
                });
                sortableInstances.push(sortable);
            });
        }

        window.saveToFirebase = async function() {
            const dataToSave = {};

            BOARD_IDS.forEach(boardId => {
                const currentBoard = document.getElementById(boardId);
                const fileCards = currentBoard.querySelectorAll('.file-card');

                fileCards.forEach((card, index) => {
                    const fileKey = card.getAttribute('data-filekey');
                    const fileName = card.getAttribute('data-filename');
                    
                    const title = card.querySelector('.input-title').value.trim();
                    const desc = card.querySelector('.input-desc').value.trim();
                    const status = card.querySelector('.input-status').value;

                    dataToSave[fileKey] = {
                        fileName: fileName,
                        url: GITHUB_PAGES_BASE_URL + fileName,
                        title: title,
                        description: desc,
                        status: status,
                        category: boardId,
                        order: index,
                        lastUpdated: new Date().toISOString()
                    };
                });
            });

            try {
                const docRef = doc(db, 'system_data', 'function_list');
                await setDoc(docRef, dataToSave);
                
                showStatus("✅ 모든 프로그램의 위치와 설정이 Firestore에 영구 저장되었습니다!", "success");
                
                setTimeout(() => loadSystemData(), 1000); 
            } catch (error) {
                console.error("Firestore 저장 오류:", error);
                showStatus("저장에 실패했습니다. 권한 설정을 확인해주세요.", "error");
            }
        };

        function showStatus(message, type) {
            const alertEl = document.getElementById('statusAlert');
            const textEl = document.getElementById('statusText');
            
            alertEl.className = 'mb-6 p-4 rounded-xl border font-bold text-sm flex items-center gap-2 transition-all shadow-sm';
            
            if (type === 'success') {
                alertEl.classList.add('bg-green-50', 'text-green-700', 'border-green-300');
            } else if (type === 'info') {
                alertEl.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-300'); 
            } else {
                alertEl.classList.add('bg-red-50', 'text-red-700', 'border-red-300');
            }
            
            textEl.textContent = message;

            if(type !== 'info') {
                setTimeout(() => {
                    alertEl.classList.add('hidden');
                }, 4000);
            }
        }

        window.addEventListener('load', () => {
            loadSystemData();
        });
    </script>
</body>
</html>
