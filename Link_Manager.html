<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로그램 및 즐겨찾기 통합 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');
        body {
            font-family: 'Gowun Dodum', sans-serif;
            background-color: #f8fafc;
        }
        /* 드래그 중인 카드 스타일 (반투명 및 테두리 효과) */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #eef2ff !important;
            border: 2px dashed #6366f1 !important;
            transform: scale(0.98);
        }
        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        /* 각 보드(구역)가 비어있을 때 표시할 텍스트 안내 */
        .board-container:empty::before {
            content: "항목을 이 곳으로 드래그 앤 드롭 하세요";
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100px;
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: bold;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 헤더 영역 -->
        <div class="bg-gray-800 text-white p-6 rounded-2xl shadow-lg mb-6 flex flex-col xl:flex-row justify-between items-center gap-4">
            <div class="w-full xl:w-auto text-center xl:text-left">
                <h1 class="text-2xl font-bold flex items-center justify-center xl:justify-start gap-2">
                    <i data-lucide="layout-dashboard" class="w-6 h-6 text-indigo-400"></i> 통합 대시보드 (앱 & 웹 북마크)
                </h1>
                <p class="text-gray-400 text-sm mt-1">파일 카드를 자유롭게 끌어다 놓고, 클릭하여 상세 내용을 수정하세요.</p>
            </div>
            <div class="flex flex-wrap justify-center gap-2 w-full xl:w-auto">
                <button onclick="addNewBookmark()" class="bg-pink-600 hover:bg-pink-500 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm shadow-md border border-pink-400">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> 새 북마크 추가
                </button>
                <button onclick="loadSystemData()" class="bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
                </button>
                <button onclick="saveToFirebase()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm shadow-md border border-indigo-400">
                    <i data-lucide="save" class="w-4 h-4"></i> 클라우드 저장
                </button>
            </div>
        </div>

        <!-- 상태 표시줄 -->
        <div id="statusAlert" class="hidden mb-6 p-4 rounded-xl border font-bold text-sm flex items-center gap-2 transition-all shadow-sm">
            <i data-lucide="info" class="w-5 h-5"></i> <span id="statusText">상태 메시지</span>
        </div>

        <!-- 전체 데이터 로딩용 오버레이 -->
        <div id="loadingIndicator" class="hidden py-20 text-center text-gray-400 flex flex-col items-center">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-3 text-indigo-400"></i>
            <p class="font-bold">데이터를 동기화하는 중입니다...</p>
        </div>

        <!-- 보드(구역) 컨테이너 그룹 -->
        <div id="boardWrapper" class="space-y-8">
            
            <!-- 1. 즐겨찾기 보드 (중요 프로그램) -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="star" class="w-6 h-6 text-yellow-500 fill-yellow-500"></i>
                    <h2 class="text-xl font-black text-gray-800">중요 앱 (상단 고정)</h2>
                </div>
                <div id="cat-favorite" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-yellow-50 rounded-2xl border-2 border-dashed border-yellow-200"></div>
            </div>

            <!-- ⭐ [NEW] 2. 웹 북마크 보드 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="globe" class="w-6 h-6 text-pink-500"></i>
                    <h2 class="text-xl font-black text-gray-800">웹 북마크 (외부 링크)</h2>
                    <span class="text-xs bg-pink-100 text-pink-600 px-2 py-0.5 rounded-full font-bold ml-2">레퍼런스, 자료, BGM</span>
                </div>
                <div id="cat-bookmarks" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-pink-50 rounded-2xl border-2 border-dashed border-pink-200"></div>
            </div>

            <!-- 3. 업무 & 유틸리티 도구 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="briefcase" class="w-6 h-6 text-blue-500"></i>
                    <h2 class="text-xl font-black text-gray-800">업무 및 유틸리티</h2>
                </div>
                <div id="cat-tools" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-200"></div>
            </div>

            <!-- 4. 게임 & 취미 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="gamepad-2" class="w-6 h-6 text-green-500"></i>
                    <h2 class="text-xl font-black text-gray-800">게임 및 취미</h2>
                </div>
                <div id="cat-games" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-green-50 rounded-2xl border-2 border-dashed border-green-200"></div>
            </div>

            <!-- 5. 미분류 보관함 -->
            <div>
                <div class="flex items-center gap-2 mb-3 px-2">
                    <i data-lucide="package-open" class="w-6 h-6 text-gray-500"></i>
                    <h2 class="text-xl font-black text-gray-800">미분류 보관함</h2>
                    <span id="uncategorizedCount" class="text-xs bg-gray-200 text-gray-600 px-2 py-0.5 rounded-full font-bold ml-2"></span>
                </div>
                <div id="cat-uncategorized" class="board-container grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 min-h-[120px] p-4 bg-gray-100 rounded-2xl border-2 border-dashed border-gray-300"></div>
            </div>

        </div>
    </div>

    <!-- Firebase 및 JavaScript 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBD5-AJDFJKsneHyqH70SlNU9VixDAHl3o",
            authDomain: "openzeroc.firebaseapp.com",
            projectId: "openzeroc",
            storageBucket: "openzeroc.firebasestorage.app",
            messagingSenderId: "465944510778",
            appId: "1:465944510778:web:df0d19b7c6b98d129f5003"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const GITHUB_REPO = "sjgong-kr/Tools";
        const GITHUB_PAGES_BASE_URL = "https://sjgong-kr.github.io/Tools/";

        // 보드 ID 배열에 북마크 전용 보드(cat-bookmarks) 추가
        const BOARD_IDS = ['cat-favorite', 'cat-bookmarks', 'cat-tools', 'cat-games', 'cat-uncategorized'];
        let sortableInstances = [];

        async function fetchGitHubFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error("API 오류");
                const data = await response.json();
                return data.filter(file => file.name.endsWith('.html'));
            } catch (error) {
                console.error(error);
                return [];
            }
        }

        async function fetchFirebaseData() {
            try {
                const docRef = doc(db, 'system_data', 'function_list');
                const docSnap = await getDoc(docRef);
                return docSnap.exists() ? docSnap.data() : {};
            } catch (error) {
                console.error("Firestore 읽기 오류:", error);
                return {};
            }
        }

        // 카드 토글 (접기/펼치기) 함수
        window.toggleCard = function(headerElement) {
            const cardBody = headerElement.nextElementSibling;
            const toggleIcon = headerElement.querySelector('.toggle-icon');
            if (cardBody.classList.contains('hidden')) {
                cardBody.classList.remove('hidden');
                toggleIcon.classList.add('rotate-180');
            } else {
                cardBody.classList.add('hidden');
                toggleIcon.classList.remove('rotate-180');
            }
        };

        // 북마크 삭제 함수
        window.deleteCard = function(btn) {
            if(confirm("이 북마크를 삭제하시겠습니까?\n삭제 후 우측 상단의 [클라우드 저장]을 눌러야 영구 반영됩니다.")) {
                const card = btn.closest('.file-card');
                card.remove();
                showStatus("항목이 목록에서 제거되었습니다. [저장] 버튼을 눌러 확정하세요.", "info");
            }
        };

        // 새 북마크 추가 함수 (상단 메뉴의 버튼 클릭 시 실행)
        window.addNewBookmark = function() {
            const newId = 'bookmark_' + Date.now();
            const bmHtml = renderBookmarkCardHTML({
                fileKey: newId,
                title: '새 북마크',
                url: 'https://',
                category: 'cat-bookmarks',
                isNew: true
            });
            document.getElementById('cat-bookmarks').insertAdjacentHTML('afterbegin', bmHtml);
            lucide.createIcons();
            showStatus("새 북마크 카드가 추가되었습니다! 내용을 입력하고 저장해주세요.", "info");
        };

        // URL 입력 시 헤더 링크 동기화
        window.updateLink = function(inputEl) {
            const card = inputEl.closest('.file-card');
            const linkBtn = card.querySelector('.ext-link');
            if(linkBtn) linkBtn.href = inputEl.value;
        };

        // [앱 카드] HTML 생성기 (기존 HTML 툴)
        function renderAppCardHTML(item) {
            const statusColor = item.status === '활성' ? 'text-green-600' : (item.status === '개발중' ? 'text-orange-500' : 'text-gray-400');
            const starColor = item.category === 'cat-favorite' ? 'text-yellow-500 fill-yellow-500' : 'text-gray-300';
            
            return `
                <div class="file-card bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col overflow-hidden group" data-type="app" data-filename="${item.fileName}" data-filekey="${item.fileKey}">
                    <div class="bg-gray-50 px-4 py-3 border-b border-gray-100 flex items-center justify-between transition-colors hover:bg-indigo-50 cursor-pointer" onclick="toggleCard(this)">
                        <div class="flex items-center gap-3 overflow-hidden w-full">
                            <div class="drag-handle p-1 -ml-2 rounded hover:bg-indigo-200 text-gray-400 hover:text-indigo-600 transition cursor-grab" title="이동" onclick="event.stopPropagation()">
                                <i data-lucide="grip-vertical" class="w-5 h-5"></i>
                            </div>
                            <i data-lucide="star" class="w-4 h-4 ${starColor} flex-shrink-0"></i>
                            <div class="flex flex-col truncate flex-1">
                                <span class="font-bold text-gray-800 text-sm truncate" title="${item.title}">${item.title}</span>
                                <span class="text-[10px] text-gray-400 truncate" title="${item.fileName}">${item.fileName}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                            <a href="${item.url}" target="_blank" class="ext-link text-gray-400 hover:text-indigo-600 p-1.5 rounded hover:bg-white shadow-sm transition" title="새 창에서 앱 실행" onclick="event.stopPropagation()">
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                            </a>
                            <div class="text-gray-400 p-1 transition"><i data-lucide="chevron-down" class="toggle-icon w-5 h-5 transition-transform duration-300"></i></div>
                        </div>
                    </div>
                    <div class="card-body hidden p-4 flex flex-col gap-3 bg-white">
                        <div>
                            <label class="flex justify-between items-center text-[11px] font-black text-gray-500 mb-1">
                                <span>앱 이름 설정</span><i data-lucide="circle-dot" class="w-3 h-3 ${statusColor}"></i>
                            </label>
                            <input type="text" class="input-title w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-indigo-500 text-sm font-bold text-gray-800 transition" value="${item.title}">
                        </div>
                        <div class="flex-1">
                            <label class="block text-[11px] font-black text-gray-500 mb-1">상세 설명</label>
                            <textarea class="input-desc w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-indigo-500 text-xs h-20 resize-none text-gray-600 transition">${item.desc}</textarea>
                        </div>
                        <div class="pt-2 border-t border-gray-100 mt-auto">
                            <select class="input-status w-full p-2 text-xs font-bold border border-gray-300 rounded-lg outline-none focus:border-indigo-500 bg-gray-50 transition cursor-pointer">
                                <option value="활성" ${item.status === '활성' ? 'selected' : ''}>✅ 활성화</option>
                                <option value="개발중" ${item.status === '개발중' ? 'selected' : ''}>🛠️ 개발 및 테스트</option>
                                <option value="숨김" ${item.status === '숨김' ? 'selected' : ''}>🔒 숨김</option>
                            </select>
                        </div>
                    </div>
                </div>`;
        }

        // [웹 북마크 카드] HTML 생성기 (웹사이트 링크 전용)
        function renderBookmarkCardHTML(item) {
            const isHiddenClass = item.isNew ? '' : 'hidden'; // 새 카드는 펼쳐서 표시
            const toggleRotate = item.isNew ? 'rotate-180' : '';
            
            return `
                <div class="file-card bg-white border border-pink-200 rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col overflow-hidden group" data-type="bookmark" data-filekey="${item.fileKey}">
                    <div class="bg-pink-50 px-4 py-3 border-b border-pink-100 flex items-center justify-between transition-colors hover:bg-pink-100 cursor-pointer" onclick="toggleCard(this)">
                        <div class="flex items-center gap-3 overflow-hidden w-full">
                            <div class="drag-handle p-1 -ml-2 rounded hover:bg-pink-200 text-pink-400 hover:text-pink-600 transition cursor-grab" title="이동" onclick="event.stopPropagation()">
                                <i data-lucide="grip-vertical" class="w-5 h-5"></i>
                            </div>
                            <i data-lucide="link" class="w-4 h-4 text-pink-500 flex-shrink-0"></i>
                            <div class="flex flex-col truncate flex-1">
                                <span class="font-bold text-gray-800 text-sm truncate" title="${item.title}">${item.title}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-1 flex-shrink-0 ml-2">
                            <a href="${item.url}" target="_blank" class="ext-link text-gray-400 hover:text-pink-600 p-1.5 rounded hover:bg-white shadow-sm transition" title="새 창 열기" onclick="event.stopPropagation()">
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                            </a>
                            <div class="text-gray-400 p-1 transition"><i data-lucide="chevron-down" class="toggle-icon w-5 h-5 ${toggleRotate} transition-transform duration-300"></i></div>
                        </div>
                    </div>
                    <div class="card-body ${isHiddenClass} p-4 flex flex-col gap-3 bg-white border-b-4 border-pink-100">
                        <div>
                            <label class="block text-[11px] font-black text-pink-500 mb-1">사이트 이름 (이모지 추천)</label>
                            <input type="text" class="input-title w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-pink-500 text-sm font-bold text-gray-800 transition" value="${item.title}" placeholder="예: 🎨 핀터레스트 레퍼런스">
                        </div>
                        <div class="flex-1">
                            <label class="block text-[11px] font-black text-pink-500 mb-1">웹사이트 URL 주소</label>
                            <input type="url" class="input-url w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-pink-500 text-xs text-blue-600 transition" value="${item.url}" placeholder="https://..." onchange="updateLink(this)">
                        </div>
                        <div class="pt-3 border-t border-gray-100 mt-2 flex justify-end">
                            <button class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition" onclick="deleteCard(this)">삭제</button>
                        </div>
                    </div>
                </div>`;
        }

        // 전체 데이터 로드
        window.loadSystemData = async function() {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('boardWrapper').classList.add('hidden');

            const [fetchedFiles, firebaseData] = await Promise.all([
                fetchGitHubFiles(),
                fetchFirebaseData()
            ]);

            document.getElementById('loadingIndicator').classList.add('hidden');
            document.getElementById('boardWrapper').classList.remove('hidden');

            BOARD_IDS.forEach(id => document.getElementById(id).innerHTML = '');

            let allItems = [];
            let newFileCount = 0;

            // 1. 앱(HTML 파일) 데이터 통합
            fetchedFiles.forEach(file => {
                const fileKey = file.name.replace(/\./g, '_');
                const savedInfo = firebaseData[fileKey] || {};
                const cat = savedInfo.category || 'cat-uncategorized';
                if(cat === 'cat-uncategorized') newFileCount++;

                allItems.push({
                    type: 'app',
                    fileKey: fileKey,
                    fileName: file.name,
                    title: savedInfo.title || file.name.replace('.html', ''),
                    desc: savedInfo.description || '',
                    status: savedInfo.status || '활성',
                    category: cat,
                    order: savedInfo.order ?? 999,
                    url: GITHUB_PAGES_BASE_URL + file.name
                });
            });

            // 2. 웹 북마크(외부 링크) 데이터 통합 (Firebase에만 존재)
            Object.keys(firebaseData).forEach(key => {
                const item = firebaseData[key];
                if (item.type === 'bookmark') {
                    allItems.push({
                        type: 'bookmark',
                        fileKey: key,
                        title: item.title || '새 북마크',
                        url: item.url || '',
                        category: item.category || 'cat-bookmarks',
                        order: item.order ?? 999
                    });
                }
            });

            // 3. 정렬 및 렌더링
            allItems.sort((a, b) => a.order - b.order).forEach(item => {
                const targetBoard = document.getElementById(item.category) || document.getElementById('cat-uncategorized');
                const html = item.type === 'bookmark' ? renderBookmarkCardHTML(item) : renderAppCardHTML(item);
                targetBoard.insertAdjacentHTML('beforeend', html);
            });

            document.getElementById('uncategorizedCount').textContent = `${newFileCount}개 대기 중`;
            lucide.createIcons();
            initDragAndDrop(); 
            showStatus("앱 및 북마크 데이터를 성공적으로 불러왔습니다.", "success");
        };

        function initDragAndDrop() {
            sortableInstances.forEach(instance => instance.destroy());
            sortableInstances = [];

            BOARD_IDS.forEach(id => {
                const el = document.getElementById(id);
                const sortable = new Sortable(el, {
                    group: 'sharedBoard', // 모든 보드 간 상호 이동 허용
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    onEnd: function () {
                        showStatus("위치가 변경되었습니다. [클라우드 저장]을 눌러야 확정됩니다.", "info");
                    }
                });
                sortableInstances.push(sortable);
            });
        }

        // 전체 데이터를 순회하여 Firestore에 저장
        window.saveToFirebase = async function() {
            const dataToSave = {};

            BOARD_IDS.forEach(boardId => {
                const currentBoard = document.getElementById(boardId);
                const fileCards = currentBoard.querySelectorAll('.file-card');

                fileCards.forEach((card, index) => {
                    const fileKey = card.getAttribute('data-filekey');
                    const cardType = card.getAttribute('data-type');
                    const title = card.querySelector('.input-title').value.trim();

                    if (cardType === 'bookmark') {
                        // 웹 북마크 데이터 저장
                        const url = card.querySelector('.input-url').value.trim();
                        dataToSave[fileKey] = {
                            type: 'bookmark',
                            title: title,
                            url: url,
                            category: boardId,
                            order: index,
                            lastUpdated: new Date().toISOString()
                        };
                    } else {
                        // 앱(HTML) 데이터 저장
                        const fileName = card.getAttribute('data-filename');
                        const desc = card.querySelector('.input-desc').value.trim();
                        const status = card.querySelector('.input-status').value;
                        dataToSave[fileKey] = {
                            type: 'app',
                            fileName: fileName,
                            title: title,
                            description: desc,
                            status: status,
                            category: boardId,
                            order: index,
                            lastUpdated: new Date().toISOString()
                        };
                    }
                });
            });

            try {
                const docRef = doc(db, 'system_data', 'function_list');
                await setDoc(docRef, dataToSave);
                
                showStatus("✅ 변경사항이 성공적으로 저장되었습니다!", "success");
                setTimeout(() => loadSystemData(), 1000); 
            } catch (error) {
                console.error("Firestore 저장 오류:", error);
                showStatus("저장에 실패했습니다. 권한을 확인해주세요.", "error");
            }
        };

        function showStatus(message, type) {
            const alertEl = document.getElementById('statusAlert');
            const textEl = document.getElementById('statusText');
            
            alertEl.className = 'mb-6 p-4 rounded-xl border font-bold text-sm flex items-center gap-2 transition-all shadow-sm';
            
            if (type === 'success') {
                alertEl.classList.add('bg-green-50', 'text-green-700', 'border-green-300');
            } else if (type === 'info') {
                alertEl.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-300'); 
            } else {
                alertEl.classList.add('bg-red-50', 'text-red-700', 'border-red-300');
            }
            
            textEl.textContent = message;

            if(type !== 'info') {
                setTimeout(() => {
                    alertEl.classList.add('hidden');
                }, 4000);
            }
        }

        window.addEventListener('load', () => {
            loadSystemData();
        });
    </script>
</body>
</html>
