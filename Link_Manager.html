<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로그램 통합 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 마우스로 부드럽게 위치를 이동시키기 위한 라이브러리 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');
        body {
            font-family: 'Gowun Dodum', sans-serif;
            background-color: #f8fafc;
        }
        /* 드래그 중인 카드 스타일 (반투명 효과) */
        .sortable-ghost {
            opacity: 0.4;
            background-color: #eef2ff !important;
            border: 2px dashed #818cf8 !important;
        }
        /* 마우스 커서 스타일 */
        .drag-handle {
            cursor: grab;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- 헤더 영역 -->
        <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-2">
                    <i data-lucide="layout-dashboard" class="w-6 h-6"></i> 내 프로그램 통합 대시보드
                </h1>
                <p class="text-indigo-200 text-sm mt-1">파일 카드의 <b>[ ⋮⋮ ]</b> 아이콘을 잡아 끌어서 순서를 마음대로 배치해 보세요.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadSystemData()" class="bg-indigo-800 hover:bg-indigo-900 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> 새로고침
                </button>
                <button onclick="saveToFirebase()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg flex items-center gap-2 transition text-sm shadow-md border border-green-400">
                    <i data-lucide="save" class="w-4 h-4"></i> 클라우드(DB) 저장
                </button>
            </div>
        </div>

        <!-- 상태 표시줄 -->
        <div id="statusAlert" class="hidden mb-6 p-4 rounded-xl border font-bold text-sm flex items-center gap-2 transition-all shadow-sm">
            <i data-lucide="info" class="w-5 h-5"></i> <span id="statusText">상태 메시지</span>
        </div>

        <!-- 파일 목록 영역 -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="font-bold text-gray-700 flex items-center gap-2 text-lg">
                    <i data-lucide="layers" class="w-5 h-5 text-indigo-500"></i> 앱 인벤토리
                </h2>
                <span id="fileCount" class="text-xs bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full font-black shadow-inner">총 0개</span>
            </div>
            
            <!-- 한 화면에 여러 개를 담기 위한 그리드(바둑판) 레이아웃 -->
            <div id="fileListContainer" class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 bg-gray-50/50 min-h-[300px]">
                <!-- 로딩 표시 -->
                <div class="col-span-full py-20 text-center text-gray-400 flex flex-col items-center">
                    <i data-lucide="loader-2" class="w-10 h-10 animate-spin mb-3 text-indigo-400"></i>
                    <p class="font-bold">GitHub 저장소에서 파일을 읽어오는 중입니다...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase 및 GitHub API 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // 기존 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBD5-AJDFJKsneHyqH70SlNU9VixDAHl3o",
            authDomain: "openzeroc.firebaseapp.com",
            projectId: "openzeroc",
            storageBucket: "openzeroc.firebasestorage.app",
            messagingSenderId: "465944510778",
            appId: "1:465944510778:web:df0d19b7c6b98d129f5003",
            databaseURL: "https://openzeroc-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // GitHub 설정
        const GITHUB_REPO = "sjgong-kr/Tools";
        const GITHUB_PAGES_BASE_URL = "https://sjgong-kr.github.io/Tools/";

        let githubFiles = [];
        let savedFirebaseData = {};
        let sortableInstance = null; // 드래그 앤 드롭 인스턴스

        async function fetchGitHubFiles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error("API 오류");
                const data = await response.json();
                return data.filter(file => file.name.endsWith('.html'));
            } catch (error) {
                console.error(error);
                return [];
            }
        }

        async function fetchFirebaseData() {
            try {
                const snapshot = await get(child(ref(db), 'function_list'));
                if (snapshot.exists()) return snapshot.val();
                return {};
            } catch (error) {
                console.error(error);
                return {};
            }
        }

        window.loadSystemData = async function() {
            const container = document.getElementById('fileListContainer');
            container.innerHTML = '<div class="col-span-full py-20 text-center text-indigo-500"><i data-lucide="loader-2" class="w-10 h-10 animate-spin mx-auto mb-3"></i><p class="font-bold">데이터 동기화 중...</p></div>';
            lucide.createIcons();

            const [fetchedFiles, firebaseData] = await Promise.all([
                fetchGitHubFiles(),
                fetchFirebaseData()
            ]);

            savedFirebaseData = firebaseData;

            // ⭐ Firebase에 저장된 '순서(order)' 값을 기준으로 파일 정렬
            githubFiles = fetchedFiles.sort((a, b) => {
                const keyA = a.name.replace(/\./g, '_');
                const keyB = b.name.replace(/\./g, '_');
                // 저장된 순서가 없으면 999로 밀어내어 맨 뒤에 배치
                const orderA = savedFirebaseData[keyA]?.order ?? 999; 
                const orderB = savedFirebaseData[keyB]?.order ?? 999;
                return orderA - orderB;
            });

            document.getElementById('fileCount').textContent = `총 ${githubFiles.length}개`;
            
            if (githubFiles.length === 0) {
                container.innerHTML = '<div class="col-span-full py-20 text-center text-gray-500 font-bold">인식된 HTML 파일이 없습니다.</div>';
                return;
            }

            container.innerHTML = ''; 

            // 카드 형태로 렌더링
            githubFiles.forEach((file) => {
                const fileKey = file.name.replace(/\./g, '_'); 
                const savedInfo = savedFirebaseData[fileKey] || {};

                const appTitle = savedInfo.title || file.name.replace('.html', '');
                const appDesc = savedInfo.description || '';
                const appStatus = savedInfo.status || '활성';
                const appLink = GITHUB_PAGES_BASE_URL + file.name;

                let statusBadgeColor = appStatus === '활성' ? 'text-green-600' : (appStatus === '개발중' ? 'text-orange-500' : 'text-gray-400');

                const fileHtml = `
                    <div class="file-card bg-white border border-gray-200 rounded-2xl shadow-sm hover:shadow-lg transition-all flex flex-col overflow-hidden group" data-filename="${file.name}" data-filekey="${fileKey}">
                        
                        <!-- 카드 헤더 (드래그 핸들 포함) -->
                        <div class="bg-gray-100 px-4 py-3 border-b border-gray-200 flex items-center justify-between transition-colors group-hover:bg-indigo-50">
                            <div class="flex items-center gap-2 overflow-hidden w-full">
                                <!-- 드래그 손잡이 아이콘 -->
                                <div class="drag-handle p-1 -ml-2 rounded hover:bg-indigo-200 text-gray-400 hover:text-indigo-600 transition cursor-grab" title="드래그해서 순서 변경">
                                    <i data-lucide="grip-vertical" class="w-5 h-5"></i>
                                </div>
                                <i data-lucide="file-code-2" class="w-4 h-4 text-indigo-400 flex-shrink-0"></i>
                                <span class="font-bold text-gray-700 text-sm truncate flex-1" title="${file.name}">${file.name}</span>
                            </div>
                            <a href="${appLink}" target="_blank" class="text-gray-400 hover:text-indigo-600 p-1 rounded hover:bg-white ml-2 shadow-sm transition flex-shrink-0" title="새 창에서 앱 실행">
                                <i data-lucide="external-link" class="w-4 h-4"></i>
                            </a>
                        </div>

                        <!-- 카드 본문 (입력 폼) -->
                        <div class="p-4 flex-1 flex flex-col gap-3">
                            <div>
                                <label class="flex justify-between items-center text-[11px] font-black text-gray-500 mb-1">
                                    <span>출력용 앱 이름</span>
                                    <i data-lucide="circle-dot" class="w-3 h-3 ${statusBadgeColor}"></i>
                                </label>
                                <input type="text" class="input-title w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-sm font-bold text-gray-800 transition" placeholder="예: 성장 일기장" value="${appTitle}">
                            </div>
                            <div class="flex-1">
                                <label class="block text-[11px] font-black text-gray-500 mb-1">기능 상세 설명</label>
                                <textarea class="input-desc w-full p-2 border border-gray-300 rounded-lg outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-xs h-20 resize-none text-gray-600 leading-relaxed transition" placeholder="이 프로그램의 기능이나 용도를 메모해두세요...">${appDesc}</textarea>
                            </div>
                            <div class="pt-2 border-t border-gray-100 mt-auto">
                                <label class="block text-[11px] font-black text-gray-500 mb-1">공개 상태 설정</label>
                                <select class="input-status w-full p-2 text-xs font-bold border border-gray-300 rounded-lg outline-none focus:border-indigo-500 bg-gray-50 focus:bg-white transition cursor-pointer">
                                    <option value="활성" ${appStatus === '활성' ? 'selected' : ''}>✅ 활성화 (일반 사용)</option>
                                    <option value="개발중" ${appStatus === '개발중' ? 'selected' : ''}>🛠️ 개발 및 테스트 중</option>
                                    <option value="숨김" ${appStatus === '숨김' ? 'selected' : ''}>🔒 비공개 / 숨김</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', fileHtml);
            });

            lucide.createIcons();

            // ⭐ 드래그 앤 드롭(SortableJS) 기능 활성화
            if(sortableInstance) sortableInstance.destroy(); // 기존 인스턴스 초기화
            sortableInstance = new Sortable(container, {
                animation: 150, // 부드러운 이동 애니메이션 (ms)
                handle: '.drag-handle', // 이 클래스를 가진 요소(아이콘)를 잡았을 때만 드래그 허용
                ghostClass: 'sortable-ghost', // 드래그 시 원래 자리에 남는 그림자 효과
                onEnd: function (evt) {
                    // 위치 이동이 끝나면 시각적 피드백 제공 (저장을 유도)
                    showStatus("순서가 변경되었습니다. 잊지 말고 우측 상단의 [저장] 버튼을 눌러주세요!", "info");
                }
            });

            showStatus("파일 목록을 성공적으로 불러왔습니다.", "success");
        };

        window.saveToFirebase = async function() {
            // 화면에 보이는 카드의 현재 'DOM 순서'를 그대로 읽어옴
            const fileCards = document.querySelectorAll('.file-card');
            const dataToSave = {};

            fileCards.forEach((card, index) => {
                const fileKey = card.getAttribute('data-filekey');
                const fileName = card.getAttribute('data-filename');
                
                const title = card.querySelector('.input-title').value.trim();
                const desc = card.querySelector('.input-desc').value.trim();
                const status = card.querySelector('.input-status').value;

                dataToSave[fileKey] = {
                    fileName: fileName,
                    url: GITHUB_PAGES_BASE_URL + fileName,
                    title: title,
                    description: desc,
                    status: status,
                    order: index, // ⭐ 현재 화면상의 배치 순서를 숫자로 저장
                    lastUpdated: new Date().toISOString()
                };
            });

            try {
                await set(ref(db, 'function_list'), dataToSave);
                showStatus("✅ 모든 설정 및 배치 순서가 클라우드에 안전하게 저장되었습니다!", "success");
                savedFirebaseData = dataToSave;
            } catch (error) {
                console.error(error);
                showStatus("저장에 실패했습니다. 권한 설정을 확인해주세요.", "error");
            }
        };

        function showStatus(message, type) {
            const alertEl = document.getElementById('statusAlert');
            const textEl = document.getElementById('statusText');
            
            alertEl.className = 'mb-6 p-4 rounded-xl border font-bold text-sm flex items-center gap-2 transition-all shadow-sm';
            
            if (type === 'success') {
                alertEl.classList.add('bg-green-50', 'text-green-700', 'border-green-300');
            } else if (type === 'info') {
                alertEl.classList.add('bg-blue-50', 'text-blue-700', 'border-blue-300'); // 파란색 알림
            } else {
                alertEl.classList.add('bg-red-50', 'text-red-700', 'border-red-300');
            }
            
            textEl.textContent = message;

            // 저장 피드백 외에는 4초 후 자동 숨김
            if(type !== 'info') {
                setTimeout(() => {
                    alertEl.classList.add('hidden');
                }, 4000);
            }
        }

        window.addEventListener('load', () => {
            loadSystemData();
        });
    </script>
</body>
</html>
