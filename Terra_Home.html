<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra 판매 관리</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- 엑셀 고급 스타일링 지원 라이브러리 (SheetJS-Style) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0fdf4; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .tab-active { color: #059669; border-bottom: 3px solid #059669; }
        
        @keyframes fadeInTab {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tab-content:not(.hidden) { animation: fadeInTab 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-y-scroll">

    <!-- 범용 알림 모달 -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-900/60 z-[200] hidden flex items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-sm w-full text-center">
            <div id="modal-icon" class="text-emerald-500 text-5xl mb-5"><i class="fas fa-check-circle"></i></div>
            <p id="custom-modal-text" class="text-slate-900 font-black mb-6 text-lg leading-snug"></p>
            <div id="modal-buttons" class="flex gap-2">
                <button onclick="closeModal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-black transition-all shadow-lg active:scale-95 text-sm hover:bg-black">확인</button>
            </div>
        </div>
    </div>

    <!-- 메인 대시보드 -->
    <div id="app-container" class="max-w-6xl mx-auto p-4 md:p-6">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 glass-card">
            <div class="flex items-center gap-4">
                <div class="bg-gradient-to-br from-emerald-500 via-teal-500 to-green-600 p-4 rounded-2xl text-white shadow-lg rotate-3">
                    <i class="fas fa-leaf text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tighter">Terra 판매 관리</h1>
                    <p class="text-slate-400 text-xs font-bold flex items-center gap-1.5 mt-0.5">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> 통합 입출고·판매 대시보드
                    </p>
                </div>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-3">
                <button onclick="exportExcel()" class="bg-white border-2 border-emerald-500 text-emerald-600 hover:bg-emerald-50 px-4 py-2 rounded-xl text-xs font-black shadow-sm transition-all active:scale-95 flex items-center gap-2">
                    <i class="fas fa-file-excel"></i> 엑셀 다운로드
                </button>
                <div id="sync-status" class="px-5 py-2.5 bg-slate-100 text-slate-600 rounded-xl text-xs font-black border border-slate-200">Firebase 연결 중...</div>
            </div>
        </header>

        <!-- 네비게이션 탭 -->
        <nav class="flex gap-5 mb-8 border-b-2 border-slate-200 overflow-x-auto hide-scrollbar font-black text-base tracking-tight">
            <button onclick="switchTab('stock')" id="tab-btn-stock" class="pb-3 px-1 whitespace-nowrap tab-active transition-all">입출고 / 재고 관리</button>
            <button onclick="switchTab('masters')" id="tab-btn-masters" class="pb-3 px-1 whitespace-nowrap text-slate-400 hover:text-emerald-500 transition-all">기초 정보 관리</button>
            <button onclick="switchTab('stats')" id="tab-btn-stats" class="pb-3 px-1 whitespace-nowrap text-slate-400 hover:text-emerald-500 transition-all">통계 분석</button>
        </nav>

        <!-- [탭 1] 입출고/재고 관리 (통합 탭) -->
        <div id="tab-stock" class="tab-content space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- 입출고 등록 폼 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 h-fit sticky top-6">
                    <h2 class="text-xl font-black mb-6 text-slate-800 flex items-center gap-2"><i class="fas fa-exchange-alt text-emerald-500"></i> 재고 거래 등록</h2>
                    
                    <form id="form-transaction" class="space-y-4">
                        <!-- 거래 유형 선택창 -->
                        <div class="flex gap-2 p-1 bg-slate-100 rounded-xl mb-2">
                            <button type="button" id="btn-type-in" onclick="setTxType('IN')" class="flex-1 py-2.5 rounded-lg font-black text-xs transition-all bg-white shadow-sm text-teal-600 border border-slate-200">입고 (매입)</button>
                            <button type="button" id="btn-type-out" onclick="setTxType('OUT')" class="flex-1 py-2.5 rounded-lg font-black text-xs transition-all text-slate-400 hover:text-slate-600">판매 (출고)</button>
                            <input type="hidden" id="tx-type" value="IN">
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-500 ml-1">거래 일자</label>
                            <input type="date" id="tx-date" required class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400">
                        </div>

                        <div class="space-y-1">
                            <label id="label-partner" class="text-[10px] font-black text-slate-500 ml-1">입고 업체</label>
                            <select id="tx-partner" required class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400"></select>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-500 ml-1 flex justify-between">
                                <span>대상 제품</span>
                                <span id="tx-stock-display" class="text-emerald-600"></span>
                            </label>
                            <select id="tx-product" required class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400" onchange="updateTxStock()"></select>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-black text-slate-500 ml-1">수량</label>
                                <input type="number" id="tx-qty" min="1" value="1" required class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400" oninput="calcTxAmount()">
                            </div>
                            <div class="space-y-1">
                                <label id="label-price" class="text-[10px] font-black text-slate-500 ml-1">단가(원)</label>
                                <input type="number" id="tx-price" min="0" required class="w-full bg-slate-50 rounded-xl px-4 py-3 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400" oninput="calcTxAmount()">
                            </div>
                        </div>

                        <div class="space-y-1 pt-2">
                            <label class="text-[10px] font-black text-slate-500 ml-1">총 금액</label>
                            <input type="text" id="tx-amount" readonly class="w-full bg-slate-100 text-slate-700 rounded-xl px-4 py-3 text-lg font-black outline-none border border-slate-200" value="0원">
                        </div>

                        <button type="submit" id="btn-submit-tx" class="w-full bg-teal-600 hover:bg-teal-700 text-white text-sm font-black py-3.5 rounded-xl transition-all shadow-md active:scale-95 mt-4">입고 내역 저장하기</button>
                    </form>
                </div>

                <!-- 재고 현황 및 내역 리스트 -->
                <div class="lg:col-span-2 space-y-6">
                    <!-- 재고 현황 테이블 -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-black text-slate-800">실시간 재고 현황</h2>
                            <span class="text-[10px] bg-emerald-50 text-emerald-600 px-2 py-1 rounded-md font-black border border-emerald-100">자동 계산</span>
                        </div>
                        <div class="overflow-x-auto hide-scrollbar">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="border-b-2 border-slate-100 text-slate-400 text-xs font-black whitespace-nowrap">
                                        <th class="pb-3 pr-4">입고업체</th>
                                        <th class="pb-3 pr-4">카테고리</th>
                                        <th class="pb-3 pr-4">제품명</th>
                                        <th class="pb-3 pr-4 text-center">총 입고</th>
                                        <th class="pb-3 pr-4 text-center">총 판매(출고)</th>
                                        <th class="pb-3 text-right text-emerald-600">현재재고</th>
                                    </tr>
                                </thead>
                                <tbody id="inventory-status" class="divide-y divide-slate-50 text-sm font-bold">
                                    <!-- JS 렌더링 -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 거래 내역 리스트 -->
                    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                        <h2 class="text-lg font-black mb-4 text-slate-800">전체 거래 내역 (입고/판매)</h2>
                        <div id="transaction-history" class="space-y-3 max-h-[500px] overflow-y-auto hide-scrollbar pr-2">
                            <!-- JS 렌더링 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- [탭 2] 기초 정보 관리 -->
        <div id="tab-masters" class="tab-content hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 입고 업체 관리 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-4 text-slate-800 flex items-center gap-2"><i class="fas fa-industry text-indigo-500"></i> 입고 업체 (제조/공급사)</h2>
                    <form id="form-vendor" class="flex gap-2 mb-4">
                        <input type="text" id="master-vendor" placeholder="업체명 입력" required class="flex-1 bg-slate-50 rounded-xl px-4 py-2 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-indigo-400">
                        <button type="submit" class="bg-indigo-500 text-white px-4 py-2 rounded-xl font-black text-sm active:scale-95">추가</button>
                    </form>
                    <div id="list-vendor" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto hide-scrollbar"></div>
                </div>

                <!-- 판매처 관리 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-4 text-slate-800 flex items-center gap-2"><i class="fas fa-store text-amber-500"></i> 판매처 (납품처)</h2>
                    <form id="form-channel" class="flex gap-2 mb-4">
                        <input type="text" id="master-channel" placeholder="판매처명 입력" required class="flex-1 bg-slate-50 rounded-xl px-4 py-2 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-amber-400">
                        <button type="submit" class="bg-amber-500 text-white px-4 py-2 rounded-xl font-black text-sm active:scale-95">추가</button>
                    </form>
                    <div id="list-channel" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto hide-scrollbar"></div>
                </div>

                <!-- 카테고리 관리 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-4 text-slate-800 flex items-center gap-2"><i class="fas fa-tags text-rose-500"></i> 제품 카테고리</h2>
                    <form id="form-category" class="flex gap-2 mb-4">
                        <input type="text" id="master-category" placeholder="카테고리명 입력" required class="flex-1 bg-slate-50 rounded-xl px-4 py-2 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-rose-400">
                        <button type="submit" class="bg-rose-500 text-white px-4 py-2 rounded-xl font-black text-sm active:scale-95">추가</button>
                    </form>
                    <div id="list-category" class="flex flex-wrap gap-2 max-h-40 overflow-y-auto hide-scrollbar"></div>
                </div>

                <!-- 제품 관리 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-4 text-slate-800 flex items-center gap-2"><i class="fas fa-box text-emerald-500"></i> 취급 제품 등록</h2>
                    <form id="form-product" class="space-y-3 mb-4">
                        <div class="flex gap-2">
                            <select id="prod-vendor" required class="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400">
                                <option value="" disabled selected>업체 선택</option>
                            </select>
                            <select id="prod-category" required class="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400">
                                <option value="" disabled selected>카테고리 선택</option>
                            </select>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="prod-name" placeholder="제품명" required class="flex-[2] bg-slate-50 rounded-xl px-4 py-2 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-emerald-400">
                            <button type="submit" class="flex-1 bg-slate-900 text-white px-4 py-2 rounded-xl font-black text-sm active:scale-95">제품 등록</button>
                        </div>
                    </form>
                    <div class="overflow-y-auto max-h-48 hide-scrollbar">
                        <table class="w-full text-left text-sm font-bold">
                            <tbody id="list-product" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- [탭 3] 통계 분석 -->
        <div id="tab-stats" class="tab-content hidden space-y-6">
            <!-- 기간 설정 필터 -->
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex gap-1.5 w-full sm:w-auto overflow-x-auto hide-scrollbar pb-1 sm:pb-0">
                    <button onclick="setStatFilterQuick('today', this)" class="stat-filter-btn px-3 py-1.5 bg-white hover:bg-slate-100 text-slate-700 font-bold rounded-lg text-[11px] transition-all shadow-sm border border-slate-200 whitespace-nowrap">오늘</button>
                    <button onclick="setStatFilterQuick('week', this)" class="stat-filter-btn px-3 py-1.5 bg-white hover:bg-slate-100 text-slate-700 font-bold rounded-lg text-[11px] transition-all shadow-sm border border-slate-200 whitespace-nowrap">1주</button>
                    <button onclick="setStatFilterQuick('month', this)" class="stat-filter-btn px-3 py-1.5 bg-white hover:bg-slate-100 text-emerald-600 border-emerald-300 font-bold rounded-lg text-[11px] transition-all shadow-sm whitespace-nowrap">이번 달</button>
                    <button onclick="setStatFilterQuick('all', this)" class="stat-filter-btn px-3 py-1.5 bg-white hover:bg-slate-100 text-slate-700 font-bold rounded-lg text-[11px] transition-all shadow-sm border border-slate-200 whitespace-nowrap">전체</button>
                </div>
                <div class="flex items-center gap-2 w-full sm:w-auto">
                    <input type="date" id="stat-filter-start" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-black text-slate-800 focus:ring-2 focus:ring-emerald-400 w-full sm:w-32 py-2 px-2 text-center outline-none">
                    <span class="text-slate-400 font-black text-xs">~</span>
                    <input type="date" id="stat-filter-end" class="bg-slate-50 border border-slate-200 rounded-lg text-xs font-black text-slate-800 focus:ring-2 focus:ring-emerald-400 w-full sm:w-32 py-2 px-2 text-center outline-none">
                    <button onclick="renderStats()" class="bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-black transition-all flex items-center justify-center shadow-sm text-xs font-black whitespace-nowrap">조회</button>
                </div>
            </div>

            <!-- 요약 카드 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-[8px] border-emerald-500 flex flex-col justify-between">
                    <p class="text-slate-400 font-black uppercase text-xs tracking-widest mb-2">총 판매 매출액</p>
                    <h3 id="stat-total-sales" class="text-3xl font-black text-slate-800">0원</h3>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border-l-[8px] border-teal-500 flex flex-col justify-between">
                    <p class="text-slate-400 font-black uppercase text-xs tracking-widest mb-2">총 입고 매입액</p>
                    <h3 id="stat-total-purchases" class="text-3xl font-black text-slate-800">0원</h3>
                </div>
                <div class="bg-slate-900 p-6 rounded-3xl shadow-md flex flex-col justify-between">
                    <p class="text-slate-400 font-black uppercase text-xs tracking-widest mb-2">예상 순이익</p>
                    <h3 id="stat-net-profit" class="text-3xl font-black text-white">0원</h3>
                </div>
            </div>

            <!-- 판매/매출 관련 통계 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-5 text-slate-800 border-b border-slate-100 pb-3">판매처별 매출 현황</h2>
                    <div id="stat-channels" class="space-y-4"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-5 text-slate-800 border-b border-slate-100 pb-3">제품별 매출 순위</h2>
                    <div id="stat-products-out" class="space-y-4"></div>
                </div>
            </div>

            <!-- 입고/매입 관련 통계 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-5 text-slate-800 border-b border-slate-100 pb-3">입고 업체별 매입 현황</h2>
                    <div id="stat-vendors" class="space-y-4"></div>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-lg font-black mb-5 text-slate-800 border-b border-slate-100 pb-3">업체별 상세 입고 현황</h2>
                    <div id="stat-vendor-products" class="space-y-3 max-h-[300px] overflow-y-auto hide-scrollbar pr-2"></div>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 1. Firebase 구성 및 초기화 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBD5-AJDFJKsneHyqH70SlNU9VixDAHl3o",
            authDomain: "openzeroc.firebaseapp.com",
            projectId: "openzeroc",
            storageBucket: "openzeroc.firebasestorage.app",
            messagingSenderId: "465944510778",
            appId: "1:465944510778:web:df0d19b7c6b98d129f5003",
            measurementId: "G-M4K79K2XPG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let userId = null;

        // --- 2. 상태 관리 (Firebase 데이터 저장소) ---
        const state = {
            vendors: [], categories: [], channels: [], products: [], transactions: []
        };

        // 인증 상태 모니터링 (익명 로그인으로 사용자 구분)
        signInAnonymously(auth).catch(err => {
            document.getElementById('sync-status').innerText = "연결 실패";
            console.error(err);
        });

        onAuthStateChanged(auth, user => {
            if (user) {
                userId = user.uid;
                const statusEl = document.getElementById('sync-status');
                statusEl.innerText = "클라우드 연동됨";
                statusEl.className = "px-5 py-2.5 bg-emerald-50 text-emerald-600 rounded-xl text-xs font-black border border-emerald-200";
                subscribeToData();
            }
        });

        // 실시간 데이터 구독 함수
        function subscribeToData() {
            if (!userId) return;

            const handleSnapshot = (colName, stateKey) => {
                const colRef = collection(db, 'terra_data', userId, colName);
                onSnapshot(colRef, (snap) => {
                    state[stateKey] = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderAll();
                }, (error) => {
                    console.error(`Error fetching ${colName}:`, error);
                });
            };

            handleSnapshot('vendors', 'vendors');
            handleSnapshot('channels', 'channels');
            handleSnapshot('categories', 'categories');
            handleSnapshot('products', 'products');
            handleSnapshot('transactions', 'transactions');

        function formatMoney(n) { return new Intl.NumberFormat('ko-KR').format(Number(n) || 0) + '원'; }
        function getLocalDateStr() {
            const date = new Date();
            date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
            return date.toISOString().split('T')[0];
        }

            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));

            });
            document.getElementById(`tab-btn-${tab}`).classList.add('tab-active');
            document.getElementById(`tab-btn-${tab}`).classList.remove('text-slate-400');
            
            if(tab === 'stats') renderStats();
        };

        function getStock(productId) {
            const inQty = state.transactions.filter(t => t.type === 'IN' && t.productId === productId).reduce((sum, t) => sum + t.qty, 0);
            const outQty = state.transactions.filter(t => t.type === 'OUT' && t.productId === productId).reduce((sum, t) => sum + t.qty, 0);
            return { inQty, outQty, current: inQty - outQty };
        }

        function renderStats() {
            const startDate = document.getElementById('stat-filter-start').value;
            const endDate = document.getElementById('stat-filter-end').value;

            let totalSales = 0, totalPurchases = 0;
            const channelSales = {};
            const vendorPurchases = {};
            const productSales = {};
            const vendorProductPurchases = {};

            // 날짜 범위에 해당하는 거래 내역만 필터링
            const filteredTx = state.transactions.filter(tx => {
                if (startDate && tx.date < startDate) return false;
                if (endDate && tx.date > endDate) return false;
                return true;
            });

            filteredTx.forEach(tx => {
                const amt = tx.qty * tx.price;
                const pName = state.products.find(x => x.id === tx.productId)?.name || '삭제된 제품';

                if (tx.type === 'OUT') {
                    totalSales += amt;
                    const c = state.channels.find(x => x.id === tx.partnerId)?.name || '기타/삭제됨';
                    channelSales[c] = (channelSales[c] || 0) + amt;
                    productSales[pName] = (productSales[pName] || 0) + amt;
                } else {
                    totalPurchases += amt;
                    const v = state.vendors.find(x => x.id === tx.partnerId)?.name || '기타/삭제됨';
                    vendorPurchases[v] = (vendorPurchases[v] || 0) + amt;
                    
                    // 업체별 제품 상세 입고 누적
                    if(!vendorProductPurchases[v]) vendorProductPurchases[v] = {};
                    if(!vendorProductPurchases[v][pName]) vendorProductPurchases[v][pName] = { qty: 0, amt: 0 };
                    vendorProductPurchases[v][pName].qty += tx.qty;
                    vendorProductPurchases[v][pName].amt += amt;
                }
            });

            document.getElementById('stat-total-sales').innerText = formatMoney(totalSales);
            document.getElementById('stat-total-purchases').innerText = formatMoney(totalPurchases);
            document.getElementById('stat-net-profit').innerText = formatMoney(totalSales - totalPurchases);

            const renderBars = (data, containerId, colorClass) => {
                const container = document.getElementById(containerId);
                const keys = Object.keys(data).sort((a,b) => data[b] - data[a]);
                if(keys.length === 0) {
                    container.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">데이터가 없습니다.</p>'; return;
                }
                const max = Math.max(...Object.values(data));
                container.innerHTML = keys.map(k => {
                    const pct = Math.round((data[k] / max) * 100);
                    return `
                        <div>
                            <div class="flex justify-between text-xs font-bold mb-1.5">
                                <span class="text-slate-700 truncate pr-2">${k}</span><span class="text-slate-900 shrink-0">${formatMoney(data[k])}</span>
                            </div>
                            <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                <div class="${colorClass} h-full transition-all duration-1000" style="width: ${pct}%"></div>
                            </div>
                        </div>
                    `;
                }).join('');
            };

            renderBars(channelSales, 'stat-channels', 'bg-emerald-500');
            renderBars(productSales, 'stat-products-out', 'bg-indigo-400');
            renderBars(vendorPurchases, 'stat-vendors', 'bg-teal-500');
            
            // 업체별 상세 제품 입고 내역 렌더링
            const vpContainer = document.getElementById('stat-vendor-products');
            const vpKeys = Object.keys(vendorProductPurchases).sort();
            if(vpKeys.length === 0) {
                vpContainer.innerHTML = '<p class="text-sm text-slate-400 text-center py-4">데이터가 없습니다.</p>';
            } else {
                vpContainer.innerHTML = vpKeys.map(v => {
                    const products = vendorProductPurchases[v];
                    const pKeys = Object.keys(products).sort((a,b) => products[b].amt - products[a].amt);
                    const pList = pKeys.map(p => `
                        <div class="flex justify-between items-center text-xs py-2 border-b border-slate-200 last:border-0">
                            <span class="text-slate-600 font-bold truncate pr-2">${p}</span>
                            <div class="text-right shrink-0">
                                <span class="font-black text-teal-600">${products[p].qty}개</span>
                                <span class="text-[10px] text-slate-400 ml-1">(${formatMoney(products[p].amt)})</span>
                            </div>
                        </div>
                    `).join('');

                    return `
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <h3 class="text-sm font-black text-slate-800 mb-2 flex items-center gap-1.5"><i class="fas fa-industry text-indigo-400"></i> ${v}</h3>
                            <div>${pList}</div>
                        </div>
                    `;
                }).join('');
            }
        }

        window.setStatFilterQuick = (range, btnElement) => {
            // 버튼 색상 스타일 업데이트
            if(btnElement) {
                document.querySelectorAll('.stat-filter-btn').forEach(btn => {
                    btn.classList.remove('text-emerald-600', 'border-emerald-300');
                    btn.classList.add('text-slate-700', 'border-slate-200');
                });
                btnElement.classList.remove('text-slate-700', 'border-slate-200');
                btnElement.classList.add('text-emerald-600', 'border-emerald-300');
            }

            const today = new Date();
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            let start = new Date(today);
            let end = new Date(today);

            if (range === 'week') {
                start.setDate(start.getDate() - 6);
            } else if (range === 'month') {
                start = new Date(today.getFullYear(), today.getMonth(), 1);
                start.setMinutes(start.getMinutes() - start.getTimezoneOffset());
            } else if (range === 'all') {
                document.getElementById('stat-filter-start').value = '';
                document.getElementById('stat-filter-end').value = '';
                renderStats();
                return;
            }

            document.getElementById('stat-filter-start').value = start.toISOString().split('T')[0];
            document.getElementById('stat-filter-end').value = end.toISOString().split('T')[0];
            renderStats();
        };

        // --- 5. Firebase 데이터 조작 핸들러 ---

            e.preventDefault();
            const el = document.getElementById(inputId);
            if (!userId) return window.showModal("클라우드 연동 중입니다. 잠시 후 다시 시도해주세요.");
            try {
                await addDoc(collection(db, 'terra_data', userId, collectionName), { name: el.value, createdAt: Date.now() });
                el.value = '';
                if(msg) window.showModal(msg);
            } catch (error) {
                console.error("Add Error", error);
                window.showModal("등록에 실패했습니다.");
            }
        };

        document.getElementById('form-channel').onsubmit = e => handleMasterAdd(e, 'master-channel', 'channels');
        document.getElementById('form-category').onsubmit = e => handleMasterAdd(e, 'master-category', 'categories');

        document.getElementById('form-product').onsubmit = async e => {
            e.preventDefault();
            const vId = document.getElementById('prod-vendor').value;
            const cId = document.getElementById('prod-category').value;
            const nameEl = document.getElementById('prod-name');
            if(!vId || !cId) return window.showModal("업체와 카테고리를 선택하세요.");
            if (!userId) return window.showModal("클라우드 연동 중입니다.");

            try {
                await addDoc(collection(db, 'terra_data', userId, 'products'), { 
                    vendorId: vId, categoryId: cId, name: nameEl.value, createdAt: Date.now() 
                });

                window.showModal("새로운 제품이 등록되었습니다.");
            } catch (error) {
                console.error("Add Error", error);
                window.showModal("등록에 실패했습니다.");
            }
        };

        window.updateTxStock = () => {
            const type = document.getElementById('tx-type').value;
            const pId = document.getElementById('tx-product').value;
            const stockDisplay = document.getElementById('tx-stock-display');
            
            if(pId && type === 'OUT') {
                const stock = getStock(pId).current;
                stockDisplay.innerText = `현재고: ${stock}개`;
                document.getElementById('tx-qty').max = stock;
            } else {
                stockDisplay.innerText = '';
                document.getElementById('tx-qty').removeAttribute('max');
            }

        window.calcTxAmount = () => {
            const qty = Number(document.getElementById('tx-qty').value) || 0;
            const price = Number(document.getElementById('tx-price').value) || 0;
            document.getElementById('tx-amount').value = formatMoney(qty * price);
        };

        document.getElementById('form-transaction').onsubmit = async e => {
            e.preventDefault();
            if (!userId) return window.showModal("클라우드 연동 중입니다.");

            const type = document.getElementById('tx-type').value;
            const date = document.getElementById('tx-date').value;
            const partnerId = document.getElementById('tx-partner').value;
            const productId = document.getElementById('tx-product').value;
            const qty = Number(document.getElementById('tx-qty').value);
            const price = Number(document.getElementById('tx-price').value);
            
            if (type === 'OUT') {
                const stock = getStock(productId).current;
                if(qty > stock) return window.showModal("판매(출고) 수량이 현재 재고를 초과합니다!");
            }

            try {
                await addDoc(collection(db, 'terra_data', userId, 'transactions'), {
                    type, date, partnerId, productId, qty, price, createdAt: Date.now()
                });
                
                document.getElementById('tx-qty').value = 1;
                document.getElementById('tx-price').value = '';
                window.calcTxAmount();
                window.showModal(type === 'IN' ? "입고 내역이 저장되었습니다." : "판매 내역이 저장되었습니다.");
            } catch (error) {
                console.error("Transaction Error", error);
                window.showModal("거래 내역 저장에 실패했습니다.");
            }
        };

        // --- 6. 엑셀 다운로드 (SheetJS) ---
        window.exportExcel = () => {
            if (state.products.length === 0 && state.transactions.length === 0) {
                return window.showModal("내보낼 데이터가 없습니다.");
            }

            const wb = XLSX.utils.book_new();

            // --- 엑셀 스타일 정의 ---
            const borderThin = { style: "thin", color: { rgb: "BFBFBF" } }; 
            const borderAll = { top: borderThin, bottom: borderThin, left: borderThin, right: borderThin };

            const headerStyle = {
                fill: { fgColor: { rgb: "F1F5F9" } },
                font: { bold: true, color: { rgb: "334155" }, sz: 11 },
                alignment: { horizontal: "center", vertical: "center" },
                border: borderAll
            };

            const dataStyleCenter = { alignment: { horizontal: "center", vertical: "center" }, border: borderAll, font: { color: { rgb: "334155" } } };
            const dataStyleLeft = { alignment: { horizontal: "left", vertical: "center" }, border: borderAll, font: { color: { rgb: "334155" } } };
            const dataStyleMoney = { alignment: { horizontal: "right", vertical: "center" }, border: borderAll, numFmt: '#,##0"원"', font: { color: { rgb: "334155" } } };
            const dataStyleQty = { alignment: { horizontal: "center", vertical: "center" }, border: borderAll, numFmt: '#,##0"개"', font: { color: { rgb: "334155" } } };

            const titleStyle = { font: { sz: 16, bold: true, color: { rgb: "059669" } }, alignment: { vertical: "center" } };
            const dateStyle = { font: { color: { rgb: "64748B" }, italic: true }, alignment: { horizontal: "right", vertical: "center" } };

            const now = new Date();
            const printTime = `출력일시: ${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            // --- 1. 재고 현황 시트 ---
            const stockAoa = [];
            stockAoa.push([{ v: `📦 Terra 현재 재고 현황`, s: titleStyle }, null, null, null, null, { v: printTime, s: dateStyle }]);
            stockAoa.push([]);
            const stockHeaders = ['입고업체', '카테고리', '제품명', '총 입고', '총 판매', '현재 재고'];
            stockAoa.push(stockHeaders.map(h => ({ v: h, s: headerStyle })));

            state.products.forEach(p => {
                const v = state.vendors.find(x => x.id === p.vendorId)?.name || '-';
                const c = state.categories.find(x => x.id === p.categoryId)?.name || '-';
                const st = getStock(p.id);
                stockAoa.push([
                    { v: v, s: dataStyleCenter },
                    { v: c, s: dataStyleCenter },
                    { v: p.name, s: dataStyleLeft },
                    { v: st.inQty, s: dataStyleQty },
                    { v: st.outQty, s: dataStyleQty },
                    { v: st.current, s: dataStyleQty }
                ]);
            });

            const wsStock = XLSX.utils.aoa_to_sheet(stockAoa);
            wsStock['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 3 } }]; // 제목 병합
            wsStock['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 30 }, { wch: 10 }, { wch: 10 }, { wch: 15 }]; // 컬럼 넓이
            XLSX.utils.book_append_sheet(wb, wsStock, "현재 재고 현황");


            // --- 2. 거래 내역 시트 ---
            const txAoa = [];
            txAoa.push([{ v: `📊 Terra 전체 거래 내역`, s: titleStyle }, null, null, null, null, null, { v: printTime, s: dateStyle }]);
            txAoa.push([]);
            const txHeaders = ['거래일자', '구분', '관련처(업체/판매처)', '제품명', '수량', '단가', '총 금액'];
            txAoa.push(txHeaders.map(h => ({ v: h, s: headerStyle })));

            const sortedTx = [...state.transactions].sort((a,b) => new Date(a.date) - new Date(b.date));
            
            let totalSales = 0, totalPurchases = 0;

            sortedTx.forEach(tx => {
                const isOpIn = tx.type === 'IN';
                const typeStr = isOpIn ? '입고' : '판매';
                const partnerName = isOpIn 
                    ? (state.vendors.find(v => v.id === tx.partnerId)?.name || '-')
                    : (state.channels.find(c => c.id === tx.partnerId)?.name || '-');
                const pName = state.products.find(x => x.id === tx.productId)?.name || '-';
                const total = tx.qty * tx.price;
                
                if (isOpIn) totalPurchases += total;
                else totalSales += total;

                txAoa.push([
                    { v: tx.date, s: dataStyleCenter },
                    { v: typeStr, s: dataStyleCenter },
                    { v: partnerName, s: dataStyleCenter },
                    { v: pName, s: dataStyleLeft },
                    { v: tx.qty, s: dataStyleQty },
                    { v: tx.price, s: dataStyleMoney },
                    { v: total, s: dataStyleMoney }
                ]);
            });

            // 총계계산 꼬리말 추가
            txAoa.push([]); 
            const sumHeaderStyle = { font: { bold: true, color: { rgb: "334155" } }, alignment: { horizontal: "right" } };
            const sumIncomeStyle = { font: { bold: true, color: { rgb: "059669" } }, numFmt: '#,##0"원"', alignment: { horizontal: "right" } };
            const sumExpenseStyle = { font: { bold: true, color: { rgb: "14B8A6" } }, numFmt: '#,##0"원"', alignment: { horizontal: "right" } };
            const sumNetStyle = { font: { bold: true, sz: 12, color: { rgb: "0F172A" } }, numFmt: '#,##0"원"', alignment: { horizontal: "right" } };

            txAoa.push([null, null, null, null, null, {v: '🟢 총 판매 수익:', s: sumHeaderStyle}, {v: totalSales, s: sumIncomeStyle}]);
            txAoa.push([null, null, null, null, null, {v: '🔵 총 입고 매입액:', s: sumHeaderStyle}, {v: totalPurchases, s: sumExpenseStyle}]);
            txAoa.push([null, null, null, null, null, {v: '✨ 예상 순이익:', s: sumHeaderStyle}, {v: totalSales - totalPurchases, s: sumNetStyle}]);

            const wsTx = XLSX.utils.aoa_to_sheet(txAoa);
            wsTx['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 4 } }]; // 제목 병합
            wsTx['!cols'] = [{ wch: 15 }, { wch: 10 }, { wch: 20 }, { wch: 30 }, { wch: 10 }, { wch: 15 }, { wch: 15 }]; // 컬럼 넓이
            XLSX.utils.book_append_sheet(wb, wsTx, "전체 거래 내역");

            // --- 엑셀 파일 다운로드 실행 (Blob 변환) ---
            const dateStr = new Date().toISOString().split('T')[0].replace(/-/g, '');
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Terra_판매재고관리_${dateStr}.xlsx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        };

        // 초기화
        document.getElementById('tx-date').value = getLocalDateStr();
        window.setStatFilterQuick('month'); // 기본 통계 기간: 이번 달
        renderAll();
    </script>
</body>
</html>
