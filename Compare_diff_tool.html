<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파일 비교 도구</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
            background: #f8f9fa;
        }

        .file-upload {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 2px dashed #667eea;
            text-align: center;
            transition: all 0.3s;
            position: relative;
        }

        .file-upload:hover {
            border-color: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .file-upload.drag-over {
            border-color: #f5576c;
            background: #fff5f7;
            transform: scale(1.02);
        }

        .file-upload h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .file-input-wrapper {
            position: relative;
            margin: 15px 0;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .file-label:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .file-name {
            margin-top: 10px;
            color: #666;
            font-size: 0.9em;
            min-height: 20px;
        }

        .compare-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: block;
            margin: 0 auto 30px;
        }

        .compare-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .compare-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-section {
            padding: 30px;
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-card h4 {
            font-size: 0.9em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
        }

        .diff-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .diff-panel {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
        }

        .diff-header {
            background: #667eea;
            color: white;
            padding: 15px;
            font-weight: 600;
        }

        .diff-content {
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .line {
            padding: 2px 8px;
            margin: 1px 0;
            border-radius: 4px;
        }

        .line-added {
            background: #d4edda;
            color: #155724;
        }

        .line-removed {
            background: #f8d7da;
            color: #721c24;
        }

        .line-modified {
            background: #fff3cd;
            color: #856404;
        }

        .line-normal {
            background: transparent;
        }

        .char-diff {
            background: #ffc107;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }

        .char-added {
            background: #28a745;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .char-removed {
            background: #dc3545;
            color: white;
            padding: 2px 4px;
            border-radius: 3px;
            text-decoration: line-through;
        }

        .line-number {
            display: inline-block;
            width: 40px;
            color: #999;
            margin-right: 10px;
            text-align: right;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 파일 비교 도구</h1>
            <p>두 개의 파일을 업로드하여 차이점을 확인하세요</p>
        </div>

        <div class="upload-section">
            <div class="file-upload" id="dropZone1">
                <h3>파일 1</h3>
                <div class="file-input-wrapper">
                    <input type="file" id="file1" accept=".txt,.csv,.json,.xml,.html,.css,.js,.md">
                    <label for="file1" class="file-label">파일 선택</label>
                </div>
                <p style="margin: 10px 0; color: #999;">또는 파일을 드래그 앤 드롭하세요</p>
                <div class="file-name" id="file1-name">파일을 선택해주세요</div>
            </div>

            <div class="file-upload" id="dropZone2">
                <h3>파일 2</h3>
                <div class="file-input-wrapper">
                    <input type="file" id="file2" accept=".txt,.csv,.json,.xml,.html,.css,.js,.md">
                    <label for="file2" class="file-label">파일 선택</label>
                </div>
                <p style="margin: 10px 0; color: #999;">또는 파일을 드래그 앤 드롭하세요</p>
                <div class="file-name" id="file2-name">파일을 선택해주세요</div>
            </div>
        </div>

        <button class="compare-btn" id="compareBtn" disabled>비교하기</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>파일을 비교하는 중입니다...</p>
        </div>

        <div class="result-section" id="result">
            <div class="stats">
                <div class="stat-card">
                    <h4>추가된 줄</h4>
                    <div class="number" id="addedCount">0</div>
                </div>
                <div class="stat-card">
                    <h4>삭제된 줄</h4>
                    <div class="number" id="removedCount">0</div>
                </div>
                <div class="stat-card">
                    <h4>수정된 줄</h4>
                    <div class="number" id="modifiedCount">0</div>
                </div>
                <div class="stat-card">
                    <h4>일치율</h4>
                    <div class="number" id="similarity">0%</div>
                </div>
            </div>

            <div class="diff-container">
                <div class="diff-panel">
                    <div class="diff-header">파일 1</div>
                    <div class="diff-content" id="diff1"></div>
                </div>
                <div class="diff-panel">
                    <div class="diff-header">파일 2</div>
                    <div class="diff-content" id="diff2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let file1Content = null;
        let file2Content = null;

        const file1Input = document.getElementById('file1');
        const file2Input = document.getElementById('file2');
        const dropZone1 = document.getElementById('dropZone1');
        const dropZone2 = document.getElementById('dropZone2');
        const compareBtn = document.getElementById('compareBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');

        // 드래그 앤 드롭 설정
        setupDragAndDrop(dropZone1, file1Input, 1);
        setupDragAndDrop(dropZone2, file2Input, 2);

        function setupDragAndDrop(dropZone, fileInput, fileNum) {
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });

            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropZone.classList.add('drag-over');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => {
                    dropZone.classList.remove('drag-over');
                }, false);
            });

            dropZone.addEventListener('drop', (e) => {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0], fileNum);
                }
            }, false);
        }

        function handleFile(file, fileNum) {
            const fileName = file.name;
            if (fileNum === 1) {
                document.getElementById('file1-name').textContent = fileName;
            } else {
                document.getElementById('file2-name').textContent = fileName;
            }
            readFile(file, fileNum);
        }

        file1Input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file, 1);
            }
        });

        file2Input.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file, 2);
            }
        });

        function readFile(file, fileNum) {
            const reader = new FileReader();
            reader.onload = (e) => {
                if (fileNum === 1) {
                    file1Content = e.target.result;
                } else {
                    file2Content = e.target.result;
                }
                checkBothFilesLoaded();
            };
            reader.readAsText(file);
        }

        function checkBothFilesLoaded() {
            if (file1Content !== null && file2Content !== null) {
                compareBtn.disabled = false;
            }
        }

        compareBtn.addEventListener('click', () => {
            loading.classList.add('active');
            result.classList.remove('active');

            setTimeout(() => {
                compareFiles();
                loading.classList.remove('active');
                result.classList.add('active');
            }, 500);
        });

        function compareFiles() {
            const lines1 = file1Content.split('\n');
            const lines2 = file2Content.split('\n');

            const diff = getDiff(lines1, lines2);
            
            displayDiff(diff.file1, 'diff1');
            displayDiff(diff.file2, 'diff2');

            document.getElementById('addedCount').textContent = diff.added;
            document.getElementById('removedCount').textContent = diff.removed;
            document.getElementById('modifiedCount').textContent = diff.modified;
            
            const totalLines = Math.max(lines1.length, lines2.length);
            const matchingLines = totalLines - diff.added - diff.removed - diff.modified;
            const similarity = ((matchingLines / totalLines) * 100).toFixed(1);
            document.getElementById('similarity').textContent = similarity + '%';
        }

        function getDiff(lines1, lines2) {
            const result1 = [];
            const result2 = [];
            let added = 0;
            let removed = 0;
            let modified = 0;

            const maxLen = Math.max(lines1.length, lines2.length);

            for (let i = 0; i < maxLen; i++) {
                const line1 = lines1[i] !== undefined ? lines1[i] : null;
                const line2 = lines2[i] !== undefined ? lines2[i] : null;

                if (line1 === null) {
                    result1.push({ type: 'empty', text: '', number: '' });
                    result2.push({ type: 'added', text: line2, number: i + 1 });
                    added++;
                } else if (line2 === null) {
                    result1.push({ type: 'removed', text: line1, number: i + 1 });
                    result2.push({ type: 'empty', text: '', number: '' });
                    removed++;
                } else if (line1 === line2) {
                    result1.push({ type: 'normal', text: line1, number: i + 1 });
                    result2.push({ type: 'normal', text: line2, number: i + 1 });
                } else {
                    // 줄이 다를 때 문자 단위로 비교
                    const charDiff = getCharDiff(line1, line2);
                    result1.push({ 
                        type: 'modified', 
                        text: line1, 
                        number: i + 1,
                        charDiff: charDiff.text1
                    });
                    result2.push({ 
                        type: 'modified', 
                        text: line2, 
                        number: i + 1,
                        charDiff: charDiff.text2
                    });
                    modified++;
                }
            }

            return { file1: result1, file2: result2, added, removed, modified };
        }

        function getCharDiff(str1, str2) {
            const len1 = str1.length;
            const len2 = str2.length;
            const maxLen = Math.max(len1, len2);
            
            let result1 = '';
            let result2 = '';
            
            for (let i = 0; i < maxLen; i++) {
                const char1 = i < len1 ? str1[i] : '';
                const char2 = i < len2 ? str2[i] : '';
                
                if (char1 === char2) {
                    result1 += escapeHtml(char1);
                    result2 += escapeHtml(char2);
                } else {
                    if (char1) {
                        result1 += `<span class="char-removed">${escapeHtml(char1)}</span>`;
                    }
                    if (char2) {
                        result2 += `<span class="char-added">${escapeHtml(char2)}</span>`;
                    }
                }
            }
            
            return { text1: result1, text2: result2 };
        }

        function displayDiff(lines, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            lines.forEach(line => {
                const div = document.createElement('div');
                if (line.type === 'empty') {
                    div.className = 'line';
                    div.innerHTML = '&nbsp;';
                } else {
                    div.className = `line line-${line.type}`;
                    const lineNum = line.number ? `<span class="line-number">${line.number}</span>` : '';
                    
                    // 문자 단위 차이가 있으면 표시, 없으면 일반 텍스트
                    const content = line.charDiff || escapeHtml(line.text || '');
                    div.innerHTML = lineNum + content;
                }
                container.appendChild(div);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
